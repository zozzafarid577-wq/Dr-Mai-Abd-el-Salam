<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Announcements | Admin</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.ann-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px; }
.ann-card.urgent { border-left:4px solid #dc2626; }
.ann-card.normal { border-left:4px solid var(--primary); }
.ann-top { display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px; }
.ann-title { font-size:.9rem;font-weight:700; }
.ann-meta { font-size:.72rem;color:var(--muted);margin-bottom:6px; }
.ann-body { font-size:.82rem;color:var(--text-2);white-space:pre-wrap;line-height:1.6; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="b-dot"></div>Dr Mai <span>Admin</span></div>
  <div class="sidebar-scroll">
    <div class="nav-section">Overview</div>
    <a href="/drmai-staff-portal/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Dashboard</a>
    <div class="nav-section">Management</div>
    <a href="/drmai-staff-portal/students.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Students</a>
    <a href="/drmai-staff-portal/courses.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Courses</a>
    <a href="/drmai-staff-portal/tests.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Practice Tests</a>
    <a href="/drmai-staff-portal/question-bank.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>Question Bank</a>
    <a href="/drmai-staff-portal/assignments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>Assignments</a>
    <a href="/drmai-staff-portal/announcements.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Announcements</a>
  </div>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="user-avatar" id="u-av">A</div>
      <div class="user-info"><div class="user-name" id="u-name">Admin</div><div class="user-role">Administrator</div></div>
      <button class="logout-btn" onclick="signOut()" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Announcements</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ New Announcement</button>
    </div>
  </header>

  <main class="content" style="max-width:720px">
    <div id="ann-body">
      <div class="skeleton" style="height:100px;border-radius:12px;margin-bottom:10px"></div>
      <div class="skeleton" style="height:100px;border-radius:12px"></div>
    </div>
  </main>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title">New Announcement</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" class="form-input" id="ann-title" placeholder="Announcement title">
      </div>
      <div class="form-group">
        <label class="form-label">Body *</label>
        <textarea class="form-input" id="ann-body-input" rows="5" placeholder="Write your announcement here…" style="resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="ann-priority">
          <option value="normal">Normal</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Target Course (leave blank for all students)</label>
        <select class="form-input" id="ann-course">
          <option value="">All Students</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="postAnnouncement()">Post Announcement</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let announcements = [];

(async () => {
  const profile = await requireAuth('admin');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const [{ data: anns }, { data: courses }] = await Promise.all([
    sb.from('announcements').select('id, title, body, priority, course_id, created_at, courses(title)').order('created_at', { ascending: false }),
    sb.from('courses').select('id, title').eq('is_active', true).order('title')
  ]);

  announcements = anns || [];
  renderAnnouncements();

  const sel = document.getElementById('ann-course');
  (courses || []).forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.title;
    sel.appendChild(o);
  });
})();

function renderAnnouncements() {
  const body = document.getElementById('ann-body');
  if (!announcements.length) {
    body.innerHTML = '<div class="empty-state"><div class="empty-title">No Announcements</div><div class="empty-sub">Post your first announcement to students.</div></div>';
    return;
  }
  body.innerHTML = announcements.map(a => `
    <div class="ann-card ${a.priority || 'normal'}">
      <div class="ann-top">
        <div>
          ${a.priority === 'urgent' ? '<span class="badge badge-danger" style="margin-bottom:4px;display:inline-block">Urgent</span><br>' : ''}
          <div class="ann-title">${escHtml(a.title)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="color:#dc2626" onclick="deleteAnn('${a.id}')">Delete</button>
      </div>
      <div class="ann-meta">${timeAgo(a.created_at)}${a.courses?.title ? ' · ' + escHtml(a.courses.title) : ' · All Students'}</div>
      <div class="ann-body">${escHtml(a.body)}</div>
    </div>`).join('');
}

function openModal() { document.getElementById('modal-overlay').classList.add('show'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

async function postAnnouncement() {
  const title    = document.getElementById('ann-title').value.trim();
  const body     = document.getElementById('ann-body-input').value.trim();
  const priority = document.getElementById('ann-priority').value;
  const courseId = document.getElementById('ann-course').value || null;

  if (!title || !body) { showToast('Title and body are required.', 'warning'); return; }

  const { data, error } = await sb.from('announcements').insert({ title, body, priority, course_id: courseId }).select('id, title, body, priority, course_id, created_at').single();
  if (error) { showToast('Error: ' + error.message, 'error'); return; }

  announcements.unshift(data);
  renderAnnouncements();
  closeModal();
  document.getElementById('ann-title').value = '';
  document.getElementById('ann-body-input').value = '';
  showToast('Announcement posted!', 'success');
}

async function deleteAnn(id) {
  if (!confirm('Delete this announcement?')) return;
  const { error } = await sb.from('announcements').delete().eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  announcements = announcements.filter(a => a.id !== id);
  renderAnnouncements();
  showToast('Deleted.', 'success');
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
</html>
