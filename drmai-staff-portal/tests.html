<link rel="stylesheet" href="/css/portal.css">
<style>
.test-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px; }
.test-card-header { display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px; }
.test-card-title { font-size:.9rem;font-weight:700; }
.test-card-meta { font-size:.74rem;color:var(--muted);margin-bottom:10px; }
.q-admin-row { display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
.q-admin-row:last-child { border-bottom:none; }
.q-num-badge { width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px; }
.q-admin-body { flex:1;min-width:0; }
.q-text-preview { font-size:.84rem;font-weight:600;margin-bottom:4px; }
.q-opts-preview { font-size:.75rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap; }
.q-opt-chip { padding:2px 8px;border-radius:12px;background:var(--bg);border:1px solid var(--border); }
.q-opt-chip.correct { background:#f0fdf4;border-color:#bbf7d0;color:#166534;font-weight:700; }
</style>

<!-- New Test Modal -->
<div class="modal-overlay" id="test-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <div class="modal-title">New Practice Test</div>
      <button class="modal-close" onclick="closeTestModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Test Title *</label>
        <input type="text" class="form-input" id="test-title" placeholder="e.g. Unit 1 Practice Quiz">
      </div>
      <div class="form-group">
        <label class="form-label">Course *</label>
        <select class="form-input" id="test-course"><option value="">Select course…</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Time Limit (minutes, leave blank for untimed)</label>
        <input type="number" class="form-input" id="test-time" placeholder="e.g. 30" min="1">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="test-is-mock" style="width:16px;height:16px;accent-color:var(--primary)">
          <span class="form-label" style="margin:0">This is a Mock Exam (full exam, not a lesson quiz)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeTestModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTest()">Create Test</button>
    </div>
  </div>
</div>

<!-- Upload PDF Quiz Modal -->
<div class="modal-overlay" id="pdf-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title">Upload PDF Quiz</div>
      <button class="modal-close" onclick="closePdfModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="pdf-alert" class="alert" style="display:none;margin-bottom:14px"></div>
      <div class="form-group">
        <label class="form-label">Test Title *</label>
        <input type="text" class="form-input" id="pdf-title" placeholder="e.g. Lesson 1 Practice Test A">
      </div>
      <div class="form-group">
        <label class="form-label">Course *</label>
        <select class="form-input" id="pdf-course"><option value="">Select course…</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Time Limit (minutes, leave blank for untimed)</label>
        <input type="number" class="form-input" id="pdf-time" placeholder="e.g. 30" min="1">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="pdf-is-mock" style="width:16px;height:16px;accent-color:var(--primary)">
          <span class="form-label" style="margin:0">This is a Mock Exam</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">PDF File *</label>
        <input type="file" class="form-input" id="pdf-file" accept="application/pdf" style="padding:8px">

      </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePdfModal()">Cancel</button>
      <button class="btn btn-primary" id="pdf-submit-btn" onclick="submitPdfQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        Parse &amp; Create Test

    </div>

<!-- Add Question Modal -->
<div class="modal-overlay" id="q-modal">
  <div class="modal" style="max-width:560px">

      <div class="modal-title">Add Question</div>

</div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let tests = [];
let questionsMap = {};
const LETTERS = ['A','B','C','D','E'];

(async () => {
  const profile = await requireAuth('admin');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: courses } = await sb.from('courses').select('id, title').eq('is_active', true).order('title');
  [document.getElementById('test-course'), document.getElementById('pdf-course')].forEach(sel => {
    (courses || []).forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.title;
      sel.appendChild(o);
    });
  });

  await loadTests();
})();

async function loadTests() {
  const { data } = await sb.from('practice_tests').select('id, title, course_id, time_limit_min, is_active, is_mock, created_at, courses(title)').order('created_at', { ascending: false });
  tests = data || [];

  if (tests.length > 0) {
    const { data: qs } = await sb.from('test_questions').select('id, test_id, question_text, options, correct_index, order_index').in('test_id', tests.map(t => t.id)).order('order_index');
    questionsMap = {};
    (qs || []).forEach(q => {
      if (!questionsMap[q.test_id]) questionsMap[q.test_id] = [];
      questionsMap[q.test_id].push(q);
    });
  }

  renderTests();
}

function renderTests() {
  const body = document.getElementById('tests-body');
  if (!tests.length) {
    body.innerHTML = '<div class="empty-state"><div class="empty-title">No Tests</div><div class="empty-sub">Create your first practice test.</div></div>';
    return;
  }

  body.innerHTML = tests.map(t => {
    const qs = questionsMap[t.id] || [];
    return `
      <div class="test-card">
        <div class="test-card-header">
          <div>
            <div class="test-card-title">${escHtml(t.title)} <span class="badge ${t.is_active ? 'badge-success' : 'badge-danger'}" style="font-size:.62rem">${t.is_active ? 'Active' : 'Hidden'}</span>${t.is_mock ? ' <span class="badge badge-warning" style="font-size:.62rem">Mock</span>' : ''}</div>
            <div class="test-card-meta">${escHtml(t.courses?.title || '—')} · ${t.time_limit_min ? t.time_limit_min + ' min' : 'Untimed'} · ${qs.length} question${qs.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="toggleTestVis('${t.id}', ${t.is_active})">${t.is_active ? 'Hide' : 'Show'}</button>
            <button class="btn btn-ghost btn-sm" style="color:#dc2626" onclick="deleteTest('${t.id}')">Delete</button>
          </div>
        </div>

        ${qs.length > 0 ? `
          <div style="margin-bottom:10px">
            ${qs.map((q, i) => `
              <div class="q-admin-row">
                <div class="q-num-badge">${i+1}</div>
                <div class="q-admin-body">
                  <div class="q-text-preview">${escHtml(q.question_text)}</div>
                  <div class="q-opts-preview">
                    ${(q.options||[]).map((opt, oi) => `<span class="q-opt-chip${oi===q.correct_index?' correct':''}">${LETTERS[oi]}) ${escHtml(opt)}</span>`).join('')}
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" style="color:#dc2626;padding:2px 6px;flex-shrink:0" onclick="deleteQuestion('${q.id}','${t.id}')">✕</button>
              </div>`).join('')}
          </div>` : ''}

        <button class="btn btn-outline btn-sm" onclick="openQModal('${t.id}')">+ Manual Question</button>
        <button class="btn btn-outline btn-sm" style="color:var(--primary);border-color:var(--primary)" onclick="openBankPicker('${t.id}','${t.course_id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;margin-right:3px"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          From Bank
        </button>
      </div>`;
  }).join('');
}

function openTestModal() { document.getElementById('test-modal').classList.add('show'); }
function closeTestModal() { document.getElementById('test-modal').classList.remove('show'); }

async function saveTest() {
  const title    = document.getElementById('test-title').value.trim();
  const courseId = document.getElementById('test-course').value;
  const timeLim  = parseInt(document.getElementById('test-time').value) || null;
  const isMock   = document.getElementById('test-is-mock').checked;
  if (!title || !courseId) { showToast('Title and course are required.', 'warning'); return; }
  const { error } = await sb.from('practice_tests').insert({ title, course_id: courseId, time_limit_min: timeLim, is_active: true, is_mock: isMock });
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  closeTestModal();
  await loadTests();
  showToast('Test created!', 'success');
}

function openPdfModal() { document.getElementById('pdf-modal').classList.add('show'); }
function closePdfModal() {
  document.getElementById('pdf-modal').classList.remove('show');
  document.getElementById('pdf-alert').style.display = 'none';
  document.getElementById('pdf-title').value = '';
  document.getElementById('pdf-course').selectedIndex = 0;
  document.getElementById('pdf-time').value = '';
  document.getElementById('pdf-is-mock').checked = false;
  document.getElementById('pdf-file').value = '';
  const btn = document.getElementById('pdf-submit-btn');
  btn.textContent = 'Parse & Create Test'; btn.disabled = false;
}

async function submitPdfQuiz() {
  const title    = document.getElementById('pdf-title').value.trim();
  const courseId = document.getElementById('pdf-course').value;
  const timeLim  = document.getElementById('pdf-time').value;
  const isMock   = document.getElementById('pdf-is-mock').checked;
  const fileEl   = document.getElementById('pdf-file');

  const alertEl = document.getElementById('pdf-alert');
  const showAlert = (msg, type) => {
    alertEl.textContent = msg;
    alertEl.className = `alert alert-${type}`;
    alertEl.style.display = 'flex';
  };

  if (!title || !courseId) { showAlert('Title and course are required.', 'error'); return; }
  if (!fileEl.files[0]) { showAlert('Please select a PDF file.', 'error'); return; }
  if (fileEl.files[0].size > 4 * 1024 * 1024) { showAlert('File must be under 4 MB.', 'error'); return; }

  const btn = document.getElementById('pdf-submit-btn');
  btn.textContent = 'Parsing PDF…'; btn.disabled = true;
  alertEl.style.display = 'none';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const session = await getSession();
    try {
      const resp = await fetch('/api/parse-quiz-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
        body: JSON.stringify({ pdf_base64: base64, title, course_id: courseId, is_mock: isMock, time_limit_min: timeLim || null })
      });
      const data = await resp.json();
      if (!resp.ok) { showAlert(data.error || 'Failed to parse PDF.', 'error'); btn.textContent = 'Parse & Create Test'; btn.disabled = false; return; }
      closePdfModal();
      await loadTests();
      showToast(`✓ Created "${data.title}" with ${data.questions_created} questions!`, 'success');
    } catch (err) {
      showAlert('Network error: ' + err.message, 'error');
      btn.textContent = 'Parse & Create Test'; btn.disabled = false;
    }
  };
  reader.readAsDataURL(fileEl.files[0]);
}

async function toggleTestVis(id, current) {
  await sb.from('practice_tests').update({ is_active: !current }).eq('id', id);
  await loadTests();
}

async function deleteTest(id) {
  if (!confirm('Delete this test and all its questions?')) return;
  await sb.from('test_questions').delete().eq('test_id', id);
  const { error } = await sb.from('practice_tests').delete().eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  await loadTests();
  showToast('Test deleted.', 'success');
}

function openQModal(testId) {
  document.getElementById('q-test-id').value = testId;
  document.getElementById('q-text').value = '';
  document.getElementById('q-opts').value = '';
  document.getElementById('q-correct').value = '';
  document.getElementById('q-modal').classList.add('show');
}
function closeQModal() { document.getElementById('q-modal').classList.remove('show'); }

async function saveQuestion() {
  const testId  = document.getElementById('q-test-id').value;
  const text    = document.getElementById('q-text').value.trim();
  const optsRaw = document.getElementById('q-opts').value.trim();
  const correct = parseInt(document.getElementById('q-correct').value) - 1;

  if (!text || !optsRaw) { showToast('Question and options are required.', 'warning'); return; }
  const options = optsRaw.split('\n').map(s => s.trim()).filter(Boolean);
  if (options.length < 2) { showToast('At least 2 options required.', 'warning'); return; }
  if (isNaN(correct) || correct < 0 || correct >= options.length) { showToast('Valid correct index required.', 'warning'); return; }

  const existingQs = questionsMap[testId] || [];
  const { error } = await sb.from('test_questions').insert({ test_id: testId, question_text: text, options, correct_index: correct, order_index: existingQs.length });
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  closeQModal();
  await loadTests();
  showToast('Question added!', 'success');
}

async function deleteQuestion(qId, testId) {
  if (!confirm('Delete this question?')) return;
  await sb.from('test_questions').delete().eq('id', qId);
  await loadTests();
}

// ── Bank Picker ─────────────────────────────────────────────────

let bpTestId = null, bpCourseId = null, bpAllQs = [], bpSelectedIds = new Set();
const BP_TYPE_LABELS = { mcq:'MCQ', terms:'Choose Term', true_false:'True/False', fill_blank:'Fill Blank' };

async function openBankPicker(testId, courseId) {
  bpTestId = testId; bpCourseId = courseId;
  bpSelectedIds.clear();
  document.getElementById('bp-type').value   = '';
  document.getElementById('bp-search').value = '';
  document.getElementById('bank-modal').classList.add('show');

  const { data } = await sb.from('question_bank')
    .select('id, question_type, question_text, options, correct_index, correct_answer, difficulty')
    .eq('course_id', courseId).eq('status', 'published')
    .order('created_at', { ascending: false });
  bpAllQs = data || [];
  applyBankFilter();
}

function closeBankPicker() {
  document.getElementById('bank-modal').classList.remove('show');
}

function applyBankFilter() {
  const type   = document.getElementById('bp-type').value;
  const search = document.getElementById('bp-search').value.toLowerCase();
  const visible = bpAllQs.filter(q => {
    if (type   && q.question_type !== type) return false;
    if (search && !q.question_text.toLowerCase().includes(search)) return false;
    return true;
  });
  document.getElementById('bp-count').textContent = `${visible.length} question${visible.length !== 1 ? 's' : ''}`;
  renderBankList(visible);
}

function renderBankList(qs) {
  const list = document.getElementById('bp-list');
  if (!qs.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:.84rem">No questions found for this course.</div>';
    return;
  }
  list.innerHTML = qs.map(q => {
    const typeLabel = BP_TYPE_LABELS[q.question_type] || q.question_type;
    const checked   = bpSelectedIds.has(q.id) ? ' checked' : '';
    return `<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .12s" onmouseenter="this.style.borderColor='var(--primary)'" onmouseleave="this.style.borderColor=bpSelectedIds.has('${q.id}')?'var(--primary)':'var(--border)'" id="bp-row-${q.id}">
      <input type="checkbox" style="margin-top:3px;width:15px;height:15px;accent-color:var(--primary);flex-shrink:0"${checked} onchange="toggleBankQ('${q.id}',this)">
      <div style="flex:1;min-width:0">
        <div style="font-size:.82rem;font-weight:600;color:var(--text);line-height:1.4">${escHtml(q.question_text.slice(0, 120))}${q.question_text.length > 120 ? '…' : ''}</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px">${typeLabel} · ${(q.difficulty || 'medium').charAt(0).toUpperCase() + (q.difficulty||'medium').slice(1)}</div>
      </div>
    </label>`;
  }).join('');
  updateBpSelectedCount();
}

function toggleBankQ(id, checkbox) {
  if (checkbox.checked) { bpSelectedIds.add(id); document.getElementById('bp-row-' + id).style.borderColor = 'var(--primary)'; }
  else { bpSelectedIds.delete(id); document.getElementById('bp-row-' + id).style.borderColor = 'var(--border)'; }
  updateBpSelectedCount();
}

function updateBpSelectedCount() {
  document.getElementById('bp-selected-count').textContent = `${bpSelectedIds.size} selected`;
  document.getElementById('bp-import-btn').disabled = bpSelectedIds.size === 0;
}

async function importBankQuestions() {
  if (!bpSelectedIds.size) return;
  const btn = document.getElementById('bp-import-btn');
  btn.disabled = true; btn.textContent = 'Importing…';

  const selected = bpAllQs.filter(q => bpSelectedIds.has(q.id));
  const existing = questionsMap[bpTestId] || [];
  const rows = selected.map((q, i) => ({
    test_id:       bpTestId,
    question_text: q.question_text,
    options:       q.options || null,
    correct_index: q.correct_index ?? null,
    order_index:   existing.length + i,
    image_url:     q.image_url || null,
  }));

  const { error } = await sb.from('test_questions').insert(rows);
  if (error) { showToast('Error: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Import Selected'; return; }

  closeBankPicker();
  await loadTests();
  showToast(`${rows.length} question${rows.length !== 1 ? 's' : ''} imported!`, 'success');
  btn.textContent = 'Import Selected';
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
