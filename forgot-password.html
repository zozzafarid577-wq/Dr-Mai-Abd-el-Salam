<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password | Dr Mai Abd El Salam</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.wrap{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo a{font-size:1.1rem;font-weight:800;color:#111}
.logo a span{color:#1a56db}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card h1{font-size:1.35rem;font-weight:900;letter-spacing:-.02em;margin-bottom:8px}
.card p{font-size:.82rem;color:#6b7280;margin-bottom:28px;line-height:1.65;font-weight:500}
.alert-box{display:none;padding:11px 14px;border-radius:8px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.alert-box.error{background:#fef2f2;color:#991b1b}
.alert-box.success{background:#f0fdf4;color:#166534}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;font-weight:600;color:#111827;margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.88rem;font-family:inherit;color:#111;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.btn-submit{width:100%;padding:12px;background:#111827;color:#fff;border:none;border-radius:9px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-submit:hover{background:#1f2937}
.btn-submit:disabled{background:#9ca3af;cursor:not-allowed}
.success-state{display:none;text-align:center;padding:12px 0}
.success-icon{width:56px;height:56px;border-radius:50%;background:#f0fdf4;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-icon svg{width:28px;height:28px;color:#16a34a}
.success-state h2{font-size:1.1rem;font-weight:800;margin-bottom:8px}
.success-state p{font-size:.82rem;color:#6b7280;line-height:1.6}
.foot{text-align:center;margin-top:24px}
.foot a{font-size:.78rem;font-weight:600;color:#6b7280}
.foot a:hover{color:#111}
@media(max-width:440px){.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <a href="/">Dr Mai <span>Abd El Salam</span></a>
  </div>

  <div class="card">
    <div id="form-state">
      <h1>Reset your password</h1>
      <p>Enter your email address and we'll send you a link to reset your password.</p>

      <div class="alert-box" id="alert"></div>

      <form id="reset-form">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Send Reset Link</button>
      </form>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Check your email</h2>
      <p>We've sent a password reset link to <strong id="sent-email"></strong>. It may take a minute to arrive.</p>
    </div>
  </div>

  <div class="foot">
    <a href="/login.html">← Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
document.getElementById('reset-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');

  btn.textContent = 'Sending…';
  btn.disabled = true;
  alert.style.display = 'none';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: `${location.origin}/reset-password.html`
  });

  if (error) {
    alert.textContent = error.message;
    alert.className = 'alert-box error';
    alert.style.display = 'block';
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
    return;
  }

  document.getElementById('sent-email').textContent = email;
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'block';
});
</script>
</body>
</html>
