<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password | Dr Mai Abd El Salam</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1d4ed8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.wrap{width:100%;max-width:420px}

.card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,.25)}

.card-logo{margin-bottom:28px}
.card-logo-name{font-size:1rem;font-weight:800;letter-spacing:-.02em;color:#0f172a}
.card-logo-name span{color:#2563eb}

.card h1{font-size:1.55rem;font-weight:900;letter-spacing:-.03em;color:#0f172a;margin-bottom:6px}
.card-sub{font-size:.84rem;color:#64748b;margin-bottom:28px;line-height:1.55}

.alert-box{display:none;padding:12px 16px;border-radius:10px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.alert-box.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.alert-box.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

.field{margin-bottom:18px}
.field-label{font-size:.75rem;font-weight:600;color:#374151;margin-bottom:7px;letter-spacing:.01em;display:block}
.field-input-wrap{position:relative}
.field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none}
.field-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;display:block}
.field input{
  width:100%;padding:11px 14px 11px 38px;
  border:1.5px solid #e2e8f0;border-radius:10px;
  font-size:.875rem;font-family:inherit;color:#0f172a;
  outline:none;transition:border-color .18s,box-shadow .18s;
  background:#f8fafc;
}
.field input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.field input::placeholder{color:#cbd5e1}

.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;border:none;border-radius:10px;
  font-size:.875rem;font-weight:700;font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
  transition:transform .15s,box-shadow .15s;
  margin-top:4px;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed;transform:none}

/* Success state */
.success-state{display:none;text-align:center;padding:8px 0}
.success-icon{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#059669,#10b981);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  box-shadow:0 4px 14px rgba(5,150,105,.3);
}
.success-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2.5}
.success-state h2{font-size:1.2rem;font-weight:900;letter-spacing:-.02em;color:#0f172a;margin-bottom:10px}
.success-state p{font-size:.84rem;color:#64748b;line-height:1.6}

.foot{text-align:center;margin-top:24px}
.foot a{font-size:.78rem;color:rgba(255,255,255,.65);font-weight:500;transition:color .15s}
.foot a:hover{color:#fff}

@media(max-width:440px){.card{padding:28px 22px;border-radius:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-logo">
      <div class="card-logo-name">Dr Mai <span>Abd El Salam</span></div>
    </div>

    <div id="form-state">
      <h1>Reset password</h1>
      <p class="card-sub">Enter your email and we'll send you a reset link.</p>

      <div class="alert-box" id="alert"></div>

      <form id="reset-form">
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <div class="field-input-wrap">
            <span class="field-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Send Reset Link</button>
      </form>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Check your email</h2>
      <p>We've sent a reset link to <strong id="sent-email"></strong>. It may take a minute to arrive.</p>
    </div>
  </div>

  <div class="foot">
    <a href="/login.html">← Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
document.getElementById('reset-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');

  btn.textContent = 'Sending…';
  btn.disabled = true;
  alert.style.display = 'none';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: `${location.origin}/reset-password.html`
  });

  if (error) {
    alert.textContent = error.message;
    alert.className = 'alert-box error';
    alert.style.display = 'block';
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
    return;
  }

  document.getElementById('sent-email').textContent = email;
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'block';
});
</script>
</body>
</html>
