<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In | Dr Mai Abd El Salam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.login-wrap{width:100%;max-width:420px}

.login-logo{text-align:center;margin-bottom:28px}
.login-logo a{font-size:1.1rem;font-weight:800;color:#111}
.login-logo a span{color:#1a56db}
.login-logo p{font-size:.75rem;color:#6b7280;margin-top:4px;font-weight:500}

.login-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-card h1{font-size:1.4rem;font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
.login-card .subtitle{font-size:.82rem;color:#6b7280;margin-bottom:28px;font-weight:500}

.alert-box{display:none;padding:11px 14px;border-radius:8px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.alert-box.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.alert-box.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}

.field{margin-bottom:18px}
.field label{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;font-weight:600;color:#111827;margin-bottom:6px}
.field label a{font-weight:600;color:#1a56db;font-size:.75rem}
.field label a:hover{text-decoration:underline}
.pw-wrap{position:relative}
.field input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.88rem;font-family:inherit;color:#111;outline:none;transition:border-color .2s,box-shadow .2s}
.pw-wrap input{padding-right:56px}
.field input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:.72rem;font-weight:700;color:#1a56db;cursor:pointer;padding:4px 2px}

.btn-login{width:100%;padding:12px;background:#111827;color:#fff;border:none;border-radius:9px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-login:hover{background:#1f2937}
.btn-login:disabled{background:#9ca3af;cursor:not-allowed}

.login-foot{text-align:center;margin-top:24px}
.login-foot a{font-size:.78rem;font-weight:600;color:#6b7280}
.login-foot a:hover{color:#111}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#d1d5db;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}

@media(max-width:440px){
  .login-card{padding:28px 20px;border-radius:12px}
}
</style>
</head>
<body>
<div class="login-wrap">

  <div class="login-logo">
    <a href="/">Dr Mai <span>Abd El Salam</span></a>
    <p>Biology Education Portal</p>
  </div>

  <div class="login-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your courses and materials.</p>

    <div class="alert-box" id="alert"></div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">
          Password
          <a href="/forgot-password.html">Forgot password?</a>
        </label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()">Show</button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="submit-btn">Sign In</button>
    </form>
  </div>

  <div class="login-foot">
    <a href="/">← Back to main site</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
// Redirect if already logged in
(async () => {
  const session = await getSession();
  if (session) await handlePostLogin();

  // Show error from URL param (e.g. account deactivated)
  const e = new URLSearchParams(location.search).get('e');
  if (e === 'inactive') showAlert('Your account has been deactivated. Please contact Dr Mai.', 'error');
})();

document.getElementById('login-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  hideAlert();

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    const msg = error.message.includes('Invalid login credentials')
      ? 'Incorrect email or password. Please try again.'
      : error.message;
    showAlert(msg, 'error');
    btn.textContent = 'Sign In';
    btn.disabled = false;
    return;
  }

  await handlePostLogin();
});

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pw-toggle');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert-box ${type}`;
  el.style.display = 'block';
}
function hideAlert() {
  document.getElementById('alert').style.display = 'none';
}
</script>
</body>
</html>
