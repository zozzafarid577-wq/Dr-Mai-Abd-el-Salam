<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Announcements | Student Portal</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.ann-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .15s; }
.ann-card.urgent { border-left:4px solid #dc2626; }
.ann-card.normal { border-left:4px solid var(--primary); }
.ann-top { display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px; }
.ann-title { font-size:.92rem;font-weight:700; }
.ann-date { font-size:.72rem;color:var(--muted);white-space:nowrap; }
.ann-body { font-size:.84rem;color:var(--text-2);line-height:1.65;white-space:pre-wrap; }
.ann-course { display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;background:rgba(26,86,219,.08);color:var(--primary);font-size:.7rem;font-weight:700; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">

  <div class="sidebar-scroll">

    <a href="/portal/lessons.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>Recordings</a>
    <a href="/portal/pdfs.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Lesson PDFs</a>
    <div class="nav-section">Practice</div>
    <a href="/portal/tests.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Practice Tests</a>
    <a href="/portal/assignments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>Assignments</a>
    <div class="nav-section">More</div>
    <a href="/portal/announcements.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Announcements</a>

  </div>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="user-avatar" id="u-av">…</div>
      <div class="user-info"><div class="user-name" id="u-name">Loading…</div><div class="user-role">Student</div></div>
      <button class="logout-btn" onclick="signOut()" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Announcements</span>
    </div>
  </header>

  <main class="content" style="max-width:680px">
    <div id="ann-body">
      <div class="skeleton" style="height:100px;border-radius:12px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:100px;border-radius:12px"></div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enrollments } = await sb.from('enrollments').select('course_id').eq('student_id', profile.id);
  const courseIds = (enrollments || []).map(e => e.course_id);

  // Global announcements + course-specific ones the student is enrolled in
  const { data: anns } = await sb
    .from('announcements')
    .select('id, title, body, priority, course_id, created_at, courses(title)')
    .or(`course_id.is.null,course_id.in.(${courseIds.join(',') || 'null'})`)
    .order('created_at', { ascending: false });

  const body = document.getElementById('ann-body');
  if (!anns || anns.length === 0) {
    body.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="empty-title">No Announcements</div><div class="empty-sub">Check back later for updates from your instructor.</div></div>';
    return;
  }

  body.innerHTML = anns.map(a => `
    <div class="ann-card ${a.priority || 'normal'}">
      <div class="ann-top">
        <div>
          ${a.priority === 'urgent' ? '<span class="badge badge-danger" style="margin-bottom:6px;display:inline-block">Urgent</span><br>' : ''}
          <div class="ann-title">${escHtml(a.title)}</div>
        </div>
        <div class="ann-date">${timeAgo(a.created_at)}</div>
      </div>
      <div class="ann-body">${escHtml(a.body)}</div>
      ${a.courses?.title ? `<span class="ann-course">${escHtml(a.courses.title)}</span>` : ''}
    </div>`).join('');
})();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
</html>
