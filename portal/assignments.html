<!DOCTYPE html>

<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
.test-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:flex-start;gap:16px;margin-bottom:12px;transition:border-color .15s; }
.test-card:hover { border-color:var(--primary); }
.test-icon { width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#1a56db,#0e38b1);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.test-icon.mock { background:linear-gradient(135deg,#7c3aed,#5b21b6); }
.test-icon svg { width:22px;height:22px;color:#fff; }
.test-info { flex:1;min-width:0; }
.test-name { font-size:.92rem;font-weight:700;color:var(--text); }
.test-course { font-size:.75rem;color:var(--muted);margin-top:2px; }
.test-meta { font-size:.75rem;color:var(--muted);margin-top:4px; }
.test-actions { display:flex;gap:8px;margin-top:12px;flex-wrap:wrap; }
.attempt-row { font-size:.75rem;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:inline-flex;align-items:center;gap:6px;color:var(--text-2); }
.section-heading { font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:16px 2px 10px;margin-top:4px; }
.section-heading:first-child { padding-top:0; }
.assign-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .15s; }
.assign-card.due-soon { border-color:#f59e0b; }
.assign-card.overdue { border-color:#dc2626; }
.assign-card.submitted { border-color:#16a34a;background:#f0fdf4; }
.assign-top { display:flex;align-items:flex-start;gap:12px; }
.assign-body { flex:1;min-width:0; }
.assign-title { font-size:.92rem;font-weight:700; }
.assign-desc { font-size:.8rem;color:var(--muted);margin-top:4px;line-height:1.5; }
.assign-meta { display:flex;gap:12px;flex-wrap:wrap;margin-top:8px; }
.assign-meta-item { font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px; }
.assign-actions { margin-top:14px; }
.upload-area { border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s;margin-top:16px; }
.upload-area:hover, .upload-area.drag { border-color:var(--primary); }
.upload-area p { font-size:.82rem;color:var(--muted);margin-top:6px; }
.submit-feedback { background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px;font-size:.82rem; }
.submit-feedback .score-big { font-size:1.5rem;font-weight:900;color:var(--primary); }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let profile = null;
let assignments = [];
let submissionsMap = {};
let activeAssignment = null;
let chosenFile = null;

(async () => {
  profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enrollments } = await sb.from('enrollments').select('course_id').eq('student_id', profile.id);
  const courseIds = (enrollments || []).map(e => e.course_id);

  const [{ data: assignData }, { data: subData }] = await Promise.all([
    sb.from('assignments').select('id, title, description, due_at, max_score, course_id, assignment_type, test_id, courses(title)').in('course_id', courseIds).order('due_at', { ascending: true }),
    sb.from('assignment_submissions').select('id, assignment_id, file_url, score, feedback, submitted_at').eq('student_id', profile.id)
  ]);

  const testIds = (tests || []).map(t => t.id);
  let qCounts = [];
  if (testIds.length) {
    const { data: qData } = await sb.from('test_questions').select('test_id').in('test_id', testIds);
    qCounts = qData || [];
  }

  assignments = assignData || [];
  submissionsMap = {};
  (subData || []).forEach(s => { submissionsMap[s.assignment_id] = s; });

  renderPage(tests || [], attempts || [], qCounts);
})();

function renderPage(tests, attempts, qCounts) {
  const body = document.getElementById('assignments-body');
  let html = '';

  const practiceTests = tests.filter(t => !t.is_mock);
  const mockTests = tests.filter(t => t.is_mock);

  html += '<div class="section-heading">Practice Tests</div>';
  if (practiceTests.length === 0) {
    html += '<div class="empty-state" style="margin-bottom:24px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;color:var(--muted)"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><div class="empty-title">No Practice Tests</div><div class="empty-sub">Practice tests assigned to your courses will appear here.</div></div>';
  } else {
    html += practiceTests.map(t => renderTestCard(t, attempts, qCounts, false)).join('');
  }

  html += '<div class="section-heading">Mock Exams</div>';
  if (mockTests.length === 0) {
    html += '<div class="empty-state" style="margin-bottom:24px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;color:var(--muted)"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg><div class="empty-title">No Mock Exams</div><div class="empty-sub">Mock exams assigned to your courses will appear here.</div></div>';
  } else {
    html += mockTests.map(t => renderTestCard(t, attempts, qCounts, true)).join('');
  }

  html += '<div class="section-heading">Other Assignments</div>';
  html += renderAssignments();

  body.innerHTML = html;
}

function renderTestCard(t, attempts, qCounts, isMock) {
  const latestAttempt = attempts.find(a => a.test_id === t.id);
  const qCount = qCounts.filter(q => q.test_id === t.id).length;
  const courseName = t.courses?.title || '';
  const link = isMock ? '/portal/mock-tests.html' : '/portal/tests.html';
  const btnLabel = latestAttempt ? 'Retake' : 'Start Test';

  let attemptInfo = '';
  if (latestAttempt) {
    const pct = latestAttempt.percentage !== null && latestAttempt.percentage !== undefined ? latestAttempt.percentage + '%' : '—';
    attemptInfo = `<span class="attempt-row"><span class="badge badge-success" style="font-size:.65rem">Latest</span> ${pct}</span>`;
  }

  return `
    <div class="test-card">
      <div class="test-icon${isMock ? ' mock' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      </div>
      <div class="test-info">
        <div class="test-name">${escHtml(t.title)}</div>
        ${courseName ? `<div class="test-course">${escHtml(courseName)}</div>` : ''}
        <div class="test-meta">${qCount} question${qCount !== 1 ? 's' : ''} · ${t.time_limit_min ? t.time_limit_min + ' min' : 'Untimed'}</div>
        ${attemptInfo ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${attemptInfo}</div>` : ''}
        <div class="test-actions">
          <a class="btn btn-primary btn-sm" href="${link}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ${btnLabel}
          </a>
        </div>
      </div>
    </div>`;
}

function renderAssignments() {
  if (assignments.length === 0) {
    return '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg><div class="empty-title">No Assignments</div><div class="empty-sub">Assignments from your instructor will appear here.</div></div>';
  }

  return assignments.map(a => {
    const sub = submissionsMap[a.id];
    const now = new Date();
    const due = a.due_at ? new Date(a.due_at) : null;
    const dueSoon = due && !sub && (due - now) < 86400000 * 2 && due > now;
    const overdue = due && !sub && due < now;

    let cardCls = 'assign-card';
    if (sub) cardCls += ' submitted';
    else if (overdue) cardCls += ' overdue';
    else if (dueSoon) cardCls += ' due-soon';

    let statusBadge = '';
    if (sub) {
      statusBadge = sub.score !== null
        ? `<span class="badge badge-success">Graded ${sub.score}/${a.max_score || '?'}</span>`
        : `<span class="badge badge-warning">Submitted · Awaiting grade</span>`;
    } else if (overdue) statusBadge = `<span class="badge badge-danger">Overdue</span>`;
    else if (dueSoon) statusBadge = `<span class="badge badge-warning">Due Soon</span>`;
    else statusBadge = `<span class="badge">Pending</span>`;

    return `
      <div class="${cardCls}">
        <div class="assign-top">
          <div class="assign-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div class="assign-title">${escHtml(a.title)}</div>
              ${statusBadge}
            </div>
            ${a.description ? `<div class="assign-desc">${escHtml(a.description)}</div>` : ''}
            <div class="assign-meta">
              ${a.assignment_type === 'practice_test' ? `<span class="assign-meta-item" style="color:#2563eb;font-weight:700"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Practice Test</span>` : a.assignment_type === 'mock_test' ? `<span class="assign-meta-item" style="color:#7c3aed;font-weight:700"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>Mock Test</span>` : `<span class="assign-meta-item" style="color:#059669;font-weight:700"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>File Upload</span>`}
              ${a.courses?.title ? `<span class="assign-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/></svg>${escHtml(a.courses.title)}</span>` : ''}
              ${due ? `<span class="assign-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Due ${fmtDate(a.due_at)}</span>` : ''}
              ${a.max_score ? `<span class="assign-meta-item">Max score: ${a.max_score}</span>` : ''}
            </div>
            ${sub?.feedback ? `<div class="submit-feedback"><strong>Feedback:</strong> ${escHtml(sub.feedback)}</div>` : ''}
          </div>
        </div>
        <div class="assign-actions">
          ${sub
            ? (a.assignment_type === 'practice_test' || a.assignment_type === 'mock_test'
                ? `<span class="badge badge-success" style="font-size:.78rem;padding:6px 14px">Completed ✓</span>`
                : `<a class="btn btn-outline btn-sm" href="${escHtml(sub.file_url)}" target="_blank">View Submission</a>`)
            : (a.assignment_type === 'practice_test'
                ? `<a class="btn btn-primary btn-sm" href="/portal/tests.html${a.test_id ? '?id=' + a.test_id : ''}">Take Practice Test</a>`
                : a.assignment_type === 'mock_test'
                ? `<a class="btn btn-primary btn-sm" href="/portal/mock-tests.html${a.test_id ? '?id=' + a.test_id : ''}">Take Mock Test</a>`
                : `<button class="btn btn-primary btn-sm" onclick="openSubmit('${a.id}')">Submit File</button>`)}
        </div>
      </div>`;
  }).join('');
}

function openSubmit(assignId) {
  activeAssignment = assignments.find(a => a.id === assignId);
  if (!activeAssignment) return;
  chosenFile = null;
  document.getElementById('file-name').textContent = '';
  document.getElementById('submit-title').textContent = 'Submit: ' + activeAssignment.title;
  document.getElementById('submit-desc').textContent = activeAssignment.description || '';
  document.getElementById('submit-overlay').classList.add('show');
}

function closeSubmit() {
  document.getElementById('submit-overlay').classList.remove('show');
  activeAssignment = null;
  chosenFile = null;
}

function fileChosen(input) {
  chosenFile = input.files[0] || null;
  document.getElementById('file-name').textContent = chosenFile ? chosenFile.name : '';
}

function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag'); }
function dragLeave()  { document.getElementById('drop-zone').classList.remove('drag'); }
function dropFile(e)  {
  e.preventDefault();
  dragLeave();
  chosenFile = e.dataTransfer.files[0] || null;
  document.getElementById('file-name').textContent = chosenFile ? chosenFile.name : '';
}

async function doSubmit() {
  if (!chosenFile) { showToast('Please select a file.', 'warning'); return; }
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Uploading…';
  btn.disabled = true;

  const ext  = chosenFile.name.split('.').pop();
  const path = `submissions/${profile.id}/${activeAssignment.id}-${Date.now()}.${ext}`;

  const { error: upErr } = await sb.storage.from('assignments').upload(path, chosenFile);
  if (upErr) {
    showToast('Upload failed: ' + upErr.message, 'error');
    btn.textContent = 'Submit';
    btn.disabled = false;
    return;
  }

  const { data: { publicUrl } } = sb.storage.from('assignments').getPublicUrl(path);

  const { error: dbErr } = await sb.from('assignment_submissions').upsert({
    assignment_id: activeAssignment.id,
    student_id: profile.id,
    file_url: publicUrl,
    submitted_at: new Date().toISOString(),
  });

  if (dbErr) {
    showToast('Could not save submission: ' + dbErr.message, 'error');
    btn.textContent = 'Submit';
    btn.disabled = false;
    return;
  }

  submissionsMap[activeAssignment.id] = { file_url: publicUrl, score: null };
  showToast('Assignment submitted!', 'success');
  closeSubmit();
  const assignSec = document.getElementById('assignments-body');
  const lastHeading = assignSec.querySelectorAll('.section-heading');
  const lastH = lastHeading[lastHeading.length - 1];
  if (lastH) {
    let node = lastH.nextSibling;
    while (node) {
      const next = node.nextSibling;
      node.remove();
      node = next;
    }
    lastH.insertAdjacentHTML('afterend', renderAssignments());
  }
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
