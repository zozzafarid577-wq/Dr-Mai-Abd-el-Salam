<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Test Review | Student Portal</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="/css/portal.css">
<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
body { background:var(--bg); }
.rev-wrap { max-width:780px;margin:0 auto;padding:20px 20px 60px; }
.rev-top { display:flex;align-items:center;gap:10px;margin-bottom:20px; }
.rev-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px; }
.result-block { text-align:center;padding:6px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px; }
.result-score { font-size:3rem;font-weight:900;color:var(--primary);line-height:1; }
.result-label { font-size:.9rem;color:var(--muted);margin-top:6px; }
.result-badge { display:inline-block;padding:5px 16px;border-radius:20px;font-size:.82rem;font-weight:700;margin-top:12px; }
.review-q { margin-bottom:16px;padding:16px;background:var(--bg);border-radius:11px;border:1px solid var(--border); }
.q-opt { display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-weight:500;margin-bottom:6px; }
.q-opt.correct { border-color:#16a34a;background:#f0fdf4;color:#166534; }
.q-opt.wrong { border-color:#dc2626;background:#fef2f2;color:#991b1b; }
.opt-letter { width:25px;height:25px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0; }
.loading-center { text-align:center;padding:80px 20px;color:var(--muted); }
@media print { .rev-card { border:none;padding:0; } body { background:#fff; } }
</style>
</head>
<body>
<div class="rev-wrap">
  <div class="rev-top no-print">
    <button class="btn btn-outline btn-sm" onclick="goBack()">← Back</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary btn-sm" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print / Save PDF
    </button>
  </div>
  <div id="body" class="printable">
    <div class="loading-center"><div class="skeleton" style="height:260px;border-radius:14px"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
const LETTERS = ['A','B','C','D','E','F'];
const attemptId = new URLSearchParams(location.search).get('id');

function goBack() { location.href = '/portal/scores.html'; }

(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;
  if (!attemptId) { fail('No attempt specified.'); return; }

  const { data: a, error } = await sb
    .from('test_attempts')
    .select('id, test_id, answers, score, max_score, percentage, passed, completed_at, practice_tests(title)')
    .eq('id', attemptId)
    .single();
  if (error || !a) { fail('Could not load this result.'); return; }

  const { data: qs } = await sb
    .from('test_questions')
    .select('id, question_text, options, correct_index, correct_answer, order_index, question_type, statements, explanation')
    .eq('test_id', a.test_id)
    .order('order_index');

  render(a, qs || [], profile);
})();

function fail(msg) {
  document.getElementById('body').innerHTML = `<div class="rev-card" style="text-align:center;padding:50px 30px"><div style="font-weight:700;margin-bottom:8px">Unable to open</div><div style="color:var(--muted);font-size:.9rem;margin-bottom:20px">${escHtml(msg)}</div><button class="btn btn-primary btn-sm no-print" onclick="goBack()">Back to Scores</button></div>`;
}

function isTerms(q) { return q.question_type === 'terms' && Array.isArray(q.statements) && q.statements.length; }
function isFill(q)  { return q.question_type === 'fill_blank'; }

function render(a, questions, profile) {
  const answers = a.answers || {};
  const pct = a.percentage != null ? Math.round(a.percentage) : 0;

  const reviewHtml = questions.map((q, i) => {
    if (isTerms(q)) {
      const terms = q.options || [];
      const ans = answers[q.id] || {};
      return `
        <div class="review-q">
          <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px">Question ${i+1}</div>
          <div style="font-size:.92rem;font-weight:600;margin-bottom:12px">${escHtml(q.question_text || 'Match each statement to a term')}</div>
          ${q.statements.map((s, si) => {
            const chosen = ans[si]; const ok = chosen === s.correct_index;
            return `<div style="margin-bottom:8px;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:${ok?'#f0fdf4':(chosen!==undefined?'#fef2f2':'var(--bg)')}">
              <div style="font-size:.85rem;font-weight:600;margin-bottom:4px">${si+1}. ${escHtml(s.text)}</div>
              <div style="font-size:.8rem;color:var(--text-2)">Your answer: <strong style="color:${ok?'#166534':'#991b1b'}">${chosen!==undefined?LETTERS[chosen]+'. '+escHtml(terms[chosen]||''):'—'}</strong>${ok?' ✓':` · Correct: <strong style="color:#166534">${LETTERS[s.correct_index]}. ${escHtml(terms[s.correct_index]||'')}</strong>`}</div>
            </div>`;
          }).join('')}
          ${q.explanation ? `<div style="font-size:.82rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><strong>Explanation:</strong> ${escHtml(q.explanation)}</div>` : ''}
        </div>`;
    }
    if (isFill(q)) {
      const typed = typeof answers[q.id] === 'string' ? answers[q.id].trim() : '';
      const ok = typed.toLowerCase() === String(q.correct_answer || '').trim().toLowerCase();
      return `
        <div class="review-q">
          <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px">Question ${i+1}</div>
          <div style="font-size:.92rem;font-weight:600;margin-bottom:12px">${escHtml(q.question_text)}</div>
          <div style="padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:${ok?'#f0fdf4':'#fef2f2'};font-size:.86rem">Your answer: <strong style="color:${ok?'#166534':'#991b1b'}">${typed?escHtml(typed):'—'}</strong>${ok?' ✓':` · Correct: <strong style="color:#166534">${escHtml(q.correct_answer||'')}</strong>`}</div>
          ${q.explanation ? `<div style="font-size:.82rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><strong>Explanation:</strong> ${escHtml(q.explanation)}</div>` : ''}
        </div>`;
    }
    const chosen = answers[q.id]; const opts = q.options || [];
    return `
      <div class="review-q">
        <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px">Question ${i+1}${chosen===undefined?' · Not answered':''}</div>
        <div style="font-size:.92rem;font-weight:600;margin-bottom:12px">${escHtml(q.question_text)}</div>
        ${opts.map((opt, oi) => {
          let cls = '';
          if (oi === q.correct_index) cls = 'correct';
          else if (oi === chosen && chosen !== q.correct_index) cls = 'wrong';
          return `<div class="q-opt ${cls}"><div class="opt-letter">${LETTERS[oi]}</div><span>${escHtml(opt)}</span></div>`;
        }).join('')}
        ${q.explanation ? `<div style="font-size:.82rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><strong>Explanation:</strong> ${escHtml(q.explanation)}</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('body').innerHTML = `
    <div class="rev-card">
      <div class="result-block">
        <div style="font-size:1.05rem;font-weight:800;margin-bottom:10px">${escHtml(a.practice_tests?.title || 'Test')}</div>
        <div class="result-score">${pct}%</div>
        <div class="result-label">${a.score ?? '—'} / ${a.max_score ?? '—'} correct</div>
        <div class="result-badge badge ${a.passed?'badge-success':'badge-danger'}">${a.passed ? 'Passed ✓' : 'Not Passed'}</div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:10px">${escHtml(profile.full_name)} · ${fmtDate(a.completed_at)}</div>
      </div>
      <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px">Your Answers</div>
      ${reviewHtml}
    </div>`;
}
</script>
</body>
</html>
