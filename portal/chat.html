<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
html,body{height:100%}
/* Chat fills the area beside the portal sidebar (74px icon rail on desktop,
   full width on mobile where the sidebar is a drawer). */
.chat-shell{position:fixed;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;background:var(--bg);z-index:1}
@media(min-width:769px){.chat-shell{left:74px}}
.chat-bar{height:58px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border)}
.chat-bar .logo{width:30px;height:30px;border-radius:8px;background:#2563eb url('/assets/favicon.svg') center/cover no-repeat;flex-shrink:0}
.chat-title{font-size:.95rem;font-weight:800;color:var(--text);flex:1}
.chat-back{font-size:.8rem;font-weight:700;color:var(--primary);display:inline-flex;align-items:center;gap:6px}
.chat-scroll{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;max-width:820px;width:100%;margin:0 auto}
.msg{display:flex;flex-direction:column;max-width:76%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg-head{font-size:.68rem;font-weight:700;color:var(--muted);margin:0 4px 3px;display:flex;align-items:center;gap:6px}
.msg-admin-badge{background:#fef3c7;color:#92670a;border-radius:10px;padding:1px 7px;font-size:.58rem;font-weight:800;text-transform:uppercase}
.bubble{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:9px 13px;font-size:.9rem;line-height:1.45;color:var(--text);white-space:pre-wrap;word-break:break-word}
.msg.me .bubble{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-color:transparent}
.msg.admin .bubble{border-color:#fcd34d;background:#fffbeb}
html[data-theme="dark"] .msg.admin .bubble{background:#2a2410}
.msg-time{font-size:.6rem;color:var(--muted);margin:3px 4px 0}
.msg-del{font-size:.6rem;color:#dc2626;cursor:pointer;margin-left:6px}
.chat-input-wrap{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);padding:12px 16px}
.chat-input-row{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;resize:none;max-height:140px;min-height:44px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:.9rem;background:var(--bg);color:var(--text);outline:none}
.chat-input:focus{border-color:var(--primary)}
.chat-send{flex-shrink:0;height:44px;width:44px;border:none;border-radius:12px;background:var(--primary);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-send:disabled{opacity:.5;cursor:not-allowed}
.chat-empty{text-align:center;color:var(--muted);font-size:.85rem;margin:auto}
/* Hide the global floating theme toggle here — it collides with Send on mobile.
   A theme button lives in the top bar instead. */
.theme-toggle{display:none!important}
.bar-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bar-btn svg{width:17px;height:17px}
.bubble img{max-width:240px;max-height:240px;border-radius:10px;margin-top:2px;cursor:zoom-in;display:block}
.msg.me .bubble img{margin-left:auto}
.chat-attach{flex-shrink:0;height:44px;width:44px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-attach svg{width:18px;height:18px}
/* typing indicator */
.typing{max-width:820px;margin:0 auto;padding:0 4px 6px;font-size:.72rem;color:var(--muted);display:none;align-items:center;gap:7px}
.typing.show{display:flex}
.typing .dots{display:inline-flex;gap:3px}
.typing .dots i{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:typeBlink 1.2s infinite}
.typing .dots i:nth-child(2){animation-delay:.2s}
.typing .dots i:nth-child(3){animation-delay:.4s}
@keyframes typeBlink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
let profile = null;
let isAdmin = false;
let lastTs = null;          // most recent created_at we've rendered
const seen = new Set();     // message ids already rendered
let channel = null;         // realtime channel (messages + typing)
const SEL = 'id, sender_id, sender_name, sender_role, body, image_url, created_at';

// Admin sidebar (used when an admin opens the chatroom so they don't land on
// a student-looking page). auth.js then injects the Wayground/Notes/Team tabs.
const ADMIN_NAV = `
  <div class="nav-section">Overview</div>
  <a href="/drmai-staff-portal/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Dashboard</a>
  <div class="nav-section">Management</div>
  <a href="/drmai-staff-portal/students.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Students</a>
  <a href="/drmai-staff-portal/courses.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Courses</a>
  <a href="/drmai-staff-portal/question-bank.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/></svg>Question Bank</a>
  <a href="/drmai-staff-portal/tests.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Practice Tests</a>
  <a href="/drmai-staff-portal/assignments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>Assignments</a>
  <a href="/drmai-staff-portal/announcements.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Announcements</a>
  <a href="/portal/chat.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>Chatroom</a>
  <a href="/drmai-staff-portal/security.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Security</a>`;

(async () => {
  // Render the correct sidebar for this user BEFORE auth augments it, so an
  // admin sees the admin menu (not the student preview) in the chatroom.
  try {
    const s = await getSession();
    const pre = s ? await getProfile(s.user.id) : null;
    if (pre && pre.role === 'admin') {
      const brand = document.querySelector('.sidebar-brand');
      if (brand) brand.innerHTML = '<div class="b-dot"></div>Dr Mai <span>Admin</span>';
      const scroll = document.querySelector('.sidebar-scroll');
      if (scroll) scroll.innerHTML = ADMIN_NAV;
      const role = document.querySelector('.user-role');
      if (role) role.textContent = 'Administrator';
    }
  } catch (_) {}

  profile = await requireAuth();   // students and admins both allowed
  if (!profile) return;
  isAdmin = profile.role === 'admin';
  document.getElementById('back-link').href = isAdmin ? '/drmai-staff-portal/' : '/portal/';
  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);
  updateThemeBtn();

  await loadInitial();

  // Live updates via Realtime (messages + "is typing"), plus a slow poll.
  try {
    channel = sb.channel('chatroom', { config: { broadcast: { self: false } } })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => addMessage(payload.new, true))
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'chat_messages' }, payload => removeMessage(payload.old?.id))
      .on('broadcast', { event: 'typing' }, ({ payload }) => showTyping(payload?.name))
      .subscribe();
  } catch (_) {}
  setInterval(poll, 4000);
})();

async function loadInitial() {
  const { data } = await sb.from('chat_messages')
    .select(SEL)
    .order('created_at', { ascending: true })
    .limit(200);
  const scroll = document.getElementById('scroll');
  scroll.innerHTML = '';
  if (!data || !data.length) { scroll.innerHTML = '<div class="chat-empty" id="empty">No messages yet — say hello! 👋</div>'; return; }
  data.forEach(m => addMessage(m, false));
  scrollToBottom();
}

async function poll() {
  if (!lastTs) return;
  const { data } = await sb.from('chat_messages')
    .select(SEL)
    .gt('created_at', lastTs)
    .order('created_at', { ascending: true });
  (data || []).forEach(m => addMessage(m, true));
}

function addMessage(m, autoscroll) {
  if (!m || seen.has(m.id)) return;
  seen.add(m.id);
  if (!lastTs || m.created_at > lastTs) lastTs = m.created_at;
  const empty = document.getElementById('empty');
  if (empty) empty.remove();

  const mine = m.sender_id === profile.id;
  const admin = m.sender_role === 'admin';
  const el = document.createElement('div');
  el.className = `msg${mine ? ' me' : ''}${admin ? ' admin' : ''}`;
  el.id = 'm-' + m.id;
  const canDelete = mine || isAdmin;
  const img = m.image_url ? `<img src="${escHtml(m.image_url)}" alt="image" onclick="window.open('${escHtml(m.image_url)}','_blank')">` : '';
  const text = m.body ? escHtml(m.body) : '';
  el.innerHTML = `
    <div class="msg-head">${escHtml(mine ? 'You' : m.sender_name)}${admin ? '<span class="msg-admin-badge">Dr Mai</span>' : ''}</div>
    <div class="bubble">${text}${text && img ? '<br>' : ''}${img}</div>
    <div class="msg-time">${timeAgo(m.created_at)}${canDelete ? ` · <span class="msg-del" onclick="del('${m.id}')">delete</span>` : ''}</div>`;
  document.getElementById('scroll').appendChild(el);

  const nearBottom = isNearBottom();
  if (autoscroll && (mine || nearBottom)) scrollToBottom();
}

function removeMessage(id) {
  if (!id) return;
  const el = document.getElementById('m-' + id);
  if (el) el.remove();
}

async function send(imageUrl) {
  const input = document.getElementById('input');
  const body = input.value.trim();
  if (!body && !imageUrl) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  const { error } = await sb.from('chat_messages').insert({
    sender_id: profile.id,
    sender_name: profile.full_name,
    sender_role: profile.role,
    body,
    image_url: imageUrl || null,
  });
  btn.disabled = false;
  if (error) { alert('Could not send: ' + error.message); return; }
  input.value = ''; autoGrow(input);
  poll();   // pull our message in immediately
}

// ── Pictures ────────────────────────────────────────────────────
async function onPickImage(inp) {
  const file = inp.files[0];
  inp.value = '';
  if (!file) return;
  if (!file.type.startsWith('image/')) { alert('Please choose an image.'); return; }
  if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5 MB.'); return; }
  const btn = document.getElementById('attach-btn');
  btn.disabled = true; btn.style.opacity = '.5';
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
    const path = `${profile.id}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { error: upErr } = await sb.storage.from('chat-uploads').upload(path, file, { contentType: file.type, cacheControl: '3600' });
    if (upErr) throw new Error(upErr.message + ' (has migration v23 — the chat-uploads bucket — been run?)');
    const url = sb.storage.from('chat-uploads').getPublicUrl(path).data.publicUrl;
    await send(url);
  } catch (e) { alert('Could not upload image: ' + e.message); }
  btn.disabled = false; btn.style.opacity = '1';
}

// ── "Is typing…" indicator (ephemeral realtime broadcast) ───────
let typingHideTimer = null, lastTypingSent = 0;
function onType() {
  autoGrow(document.getElementById('input'));
  const now = Date.now();
  if (channel && now - lastTypingSent > 1500) {
    lastTypingSent = now;
    try { channel.send({ type: 'broadcast', event: 'typing', payload: { name: profile.full_name } }); } catch (_) {}
  }
}
function showTyping(name) {
  if (!name) return;
  const el = document.getElementById('typing');
  document.getElementById('typing-who').textContent = `${name} is typing`;
  el.classList.add('show');
  clearTimeout(typingHideTimer);
  typingHideTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Theme toggle (in the top bar; the global floating one is hidden here) ──
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (dark) document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', 'dark');
  try { localStorage.setItem('theme', dark ? 'light' : 'dark'); } catch (_) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-btn').innerHTML = dark
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

async function del(id) {
  if (!confirm('Delete this message?')) return;
  const { error } = await sb.from('chat_messages').delete().eq('id', id);
  if (error) { alert('Could not delete: ' + error.message); return; }
  removeMessage(id);
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function autoGrow(t) { t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 140) + 'px'; }
function isNearBottom() { const s = document.getElementById('scroll'); return s.scrollHeight - s.scrollTop - s.clientHeight < 120; }
function scrollToBottom() { const s = document.getElementById('scroll'); s.scrollTop = s.scrollHeight; }
</script>
