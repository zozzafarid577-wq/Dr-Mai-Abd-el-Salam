  <main class="content">
    <div id="courses-list" class="courses-grid">
      <div class="skeleton" style="height:180px;border-radius:12px"></div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let profile = null;

(async () => {
  profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enrollments } = await sb
    .from('enrollments')
    .select('enrolled_at, courses(id, title, subject, description, is_active)')
    .eq('student_id', profile.id)
    .order('enrolled_at', { ascending: false });

  const container = document.getElementById('courses-list');
  container.innerHTML = '';

  if (!enrollments || enrollments.length === 0) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><div class="empty-title">No Courses Yet</div><div class="empty-sub">You haven't been enrolled in any courses. Contact your instructor.</div></div>`;
    return;
  }

  // Get completion counts per course
  const courseIds = enrollments.map(e => e.courses?.id).filter(Boolean);
  const { data: completions } = await sb
    .from('lesson_completions')
    .select('lesson_id, lessons(module_id, modules(course_id))')
    .eq('student_id', profile.id);

  const completionsByCourse = {};
  (completions || []).forEach(c => {
    const cid = c.lessons?.modules?.course_id;
    if (cid) completionsByCourse[cid] = (completionsByCourse[cid] || 0) + 1;
  });

  // Get lesson counts per course
  const { data: modules } = await sb
    .from('modules')
    .select('id, course_id, lessons(id)')
    .in('course_id', courseIds);

  const lessonCountByCourse = {};
  (modules || []).forEach(m => {
    const cid = m.course_id;
    lessonCountByCourse[cid] = (lessonCountByCourse[cid] || 0) + (m.lessons?.length || 0);
  });

  enrollments.forEach((enr, idx) => {
    const c = enr.courses;
    if (!c) return;
    const total = lessonCountByCourse[c.id] || 0;
    const done  = completionsByCourse[c.id]  || 0;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
    const grad  = courseGradient(idx);

    container.innerHTML += `
      <div class="course-card" onclick="location.href='/portal/lessons.html?course=${c.id}'">
        <div class="course-icon" style="background:${grad}">
          ${escHtml(c.subject ? c.subject[0] : c.title[0])}
        </div>
        <div class="course-body">
          <div class="course-title">${escHtml(c.title)}</div>
          <div class="course-subject">${escHtml(c.subject || '')}</div>
          ${c.description ? `<div class="course-desc">${escHtml(c.description)}</div>` : ''}
          <div class="prog-row">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            <span class="prog-pct">${pct}%</span>
          </div>
          <div style="font-size:.72rem;color:var(--muted);margin-top:4px">${done} / ${total} lessons completed</div>
        </div>
      </div>`;
  });
})();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
