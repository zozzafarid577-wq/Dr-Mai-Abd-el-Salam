<style>
.pdf-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px; }
.pdf-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,box-shadow .15s; }
.pdf-card:hover { border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.08); }
.pdf-icon { width:44px;height:44px;border-radius:10px;background:#fef2f2;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.pdf-icon svg { width:22px;height:22px;color:#dc2626; }
.pdf-name { font-size:.88rem;font-weight:700;color:var(--text);line-height:1.35; }
.pdf-meta { font-size:.72rem;color:var(--muted); }
.pdf-dl { margin-top:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s; }
.pdf-dl:hover { background:#1648c0; }
.course-filter { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px; }
.filter-chip { padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.78rem;font-weight:600;cursor:pointer;background:var(--surface);transition:all .15s; }
.filter-chip.active { background:var(--primary);color:#fff;border-color:var(--primary); }
</style>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Lesson PDFs</span>
    </div>
  </header>

  <main class="content">
    <div id="filter-chips" class="course-filter"></div>
    <div id="pdf-grid" class="pdf-grid">
      <div class="skeleton" style="height:140px;border-radius:12px"></div>
      <div class="skeleton" style="height:140px;border-radius:12px"></div>
      <div class="skeleton" style="height:140px;border-radius:12px"></div>
    </div>
  </main>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let allPdfs = [];
let activeFilter = 'all';

(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enrollments } = await sb
    .from('enrollments')
    .select('courses(id, title)')
    .eq('student_id', profile.id);

  const courses = (enrollments || []).map(e => e.courses).filter(Boolean);
  const courseIds = courses.map(c => c.id);

  if (courseIds.length === 0) {
    document.getElementById('pdf-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">No PDFs Yet</div></div>';
    return;
  }

  // Fetch module-level PDFs (primary source)
  const { data: mPdfs } = await sb
    .from('module_pdfs')
    .select('id, title, file_url, created_at, modules(id, course_id, title, courses(title))')
    .order('created_at', { ascending: false });

  // Also fetch legacy lesson-level PDFs
  const { data: lPdfs } = await sb
    .from('lesson_pdfs')
    .select('id, title, file_url, created_at, lessons(title, modules(course_id, title, courses(title)))')
    .order('created_at', { ascending: false });

  // Normalize both into a unified list
  const normalizedM = (mPdfs || [])
    .filter(p => courseIds.includes(p.modules?.course_id))
    .map(p => ({
      id: p.id, title: p.title, file_url: p.file_url, created_at: p.created_at,
      course_id: p.modules?.course_id,
      course_title: p.modules?.courses?.title || '',
      lesson_title: p.modules?.title || '',
    }));

  const normalizedL = (lPdfs || [])
    .filter(p => courseIds.includes(p.lessons?.modules?.course_id))
    .map(p => ({
      id: p.id, title: p.title, file_url: p.file_url, created_at: p.created_at,
      course_id: p.lessons?.modules?.course_id,
      course_title: p.lessons?.modules?.courses?.title || '',
      lesson_title: p.lessons?.title || '',
    }));

  allPdfs = [...normalizedM, ...normalizedL].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // Build filter chips
  const chipsEl = document.getElementById('filter-chips');
  if (courses.length > 1) {
    const allChip = document.createElement('button');
    allChip.className = 'filter-chip active';
    allChip.textContent = 'All Courses';
    allChip.onclick = () => setFilter('all', allChip);
    chipsEl.appendChild(allChip);

    courses.forEach(c => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip';
      chip.textContent = c.title;
      chip.dataset.courseId = c.id;
      chip.onclick = () => setFilter(c.id, chip);
      chipsEl.appendChild(chip);
    });
  }

  renderPdfs();
})();

function setFilter(filterId, chip) {
  activeFilter = filterId;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderPdfs();
}

function renderPdfs() {
  const grid = document.getElementById('pdf-grid');
  const filtered = activeFilter === 'all'
    ? allPdfs
    : allPdfs.filter(p => p.course_id === activeFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-title">No PDFs Yet</div><div class="empty-sub">PDF resources will appear here once uploaded.</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="pdf-card">
      <div class="pdf-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div>
        <div class="pdf-name">${escHtml(p.title)}</div>
        <div class="pdf-meta">${escHtml(p.course_title)} · ${escHtml(p.lesson_title)}</div>
      </div>
      <a class="pdf-dl" href="${escHtml(p.file_url)}" target="_blank" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>
    </div>`).join('');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
