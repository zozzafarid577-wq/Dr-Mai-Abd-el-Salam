<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Progress | Student Portal</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.progress-section { margin-bottom:32px; }
.section-heading { font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px; }
.course-progress-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px; }
.cp-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:10px; }
.cp-title { font-size:.9rem;font-weight:700; }
.cp-pct { font-size:.88rem;font-weight:800;color:var(--primary); }
.big-prog { height:10px;background:var(--border);border-radius:5px;overflow:hidden; }
.big-prog-fill { height:100%;border-radius:5px;background:linear-gradient(90deg,#1a56db,#7c3aed);transition:width 1s ease; }
.cp-breakdown { display:flex;flex-wrap:wrap;gap:14px;margin-top:10px; }
.cp-breakdown span { display:inline-flex;align-items:center;gap:5px;font-size:.74rem;color:var(--muted);font-weight:600; }
.cp-breakdown svg { width:13px;height:13px; }
.test-history-row { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
.test-history-row:last-child { border-bottom:none; }
.th-name { flex:1;font-size:.84rem;font-weight:600; }
.th-score { font-size.84rem;font-weight:700;color:var(--primary);min-width:42px;text-align:right; }
.th-date { font-size:.72rem;color:var(--muted);min-width:80px;text-align:right; }
.stat-row { display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px; }
@media(min-width:600px){ .stat-row { grid-template-columns:repeat(4,1fr); } }
.mini-stat { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px; }
.mini-stat-val { font-size:1.6rem;font-weight:900;color:var(--primary); }
.mini-stat-lbl { font-size:.72rem;color:var(--muted);margin-top:2px;font-weight:600; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="b-dot"></div>Dr Mai <span>Portal</span></div>
  <div class="sidebar-scroll">
    <div class="nav-section">Main</div>
    <a href="/portal/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Dashboard</a>
    <a href="/portal/courses.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>My Courses</a>
    <a href="/portal/lessons.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>Recordings</a>
    <a href="/portal/pdfs.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Lesson PDFs</a>
    <div class="nav-section">Practice</div>
    <a href="/portal/tests.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Practice Tests</a>
    <a href="/portal/mock-tests.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>Mock Tests</a>
    <a href="/portal/assignments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>Assignments</a>
    <div class="nav-section">More</div>
    <a href="/portal/announcements.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Announcements</a>
    <a href="/portal/progress.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>My Progress</a>
    <a href="/portal/settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
  </div>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="user-avatar" id="u-av">…</div>
      <div class="user-info"><div class="user-name" id="u-name">Loading…</div><div class="user-role">Student</div></div>
      <button class="logout-btn" onclick="signOut()" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">My Progress</span>
    </div>
  </header>

  <main class="content" id="main-content">
    <div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:12px"></div>
    <div class="skeleton" style="height:120px;border-radius:12px"></div>
  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const [
    { data: enrollments },
    { data: completions },
    { data: attempts },
    { data: submissions }
  ] = await Promise.all([
    sb.from('enrollments').select('course_id, courses(id, title, subject)').eq('student_id', profile.id),
    sb.from('lesson_completions').select('lesson_id, lessons(module_id, modules(course_id))').eq('student_id', profile.id),
    sb.from('test_attempts').select('id, test_id, percentage, passed, completed_at, practice_tests(title, course_id)').eq('student_id', profile.id).order('completed_at', { ascending: false }),
    sb.from('assignment_submissions').select('id, score, assignment_id, assignments(max_score, title)').eq('student_id', profile.id)
  ]);

  const courses = (enrollments || []).map(e => e.courses).filter(Boolean);
  const courseIds = courses.map(c => c.id);

  // Completions per course
  const compByCourse = {};
  (completions || []).forEach(c => {
    const cid = c.lessons?.modules?.course_id;
    if (cid) compByCourse[cid] = (compByCourse[cid] || 0) + 1;
  });

  // Total lessons per course + total tests per course (run together)
  const [{ data: modules }, { data: allTests }] = await Promise.all([
    sb.from('modules').select('course_id, lessons(id)').in('course_id', courseIds.length ? courseIds : ['00000000-0000-0000-0000-000000000000']),
    sb.from('practice_tests').select('id, course_id').in('course_id', courseIds.length ? courseIds : ['00000000-0000-0000-0000-000000000000']).eq('is_active', true)
  ]);
  const totalByCourse = {};
  (modules || []).forEach(m => {
    totalByCourse[m.course_id] = (totalByCourse[m.course_id] || 0) + (m.lessons?.length || 0);
  });
  const totalTestsByCourse = {};
  (allTests || []).forEach(t => { totalTestsByCourse[t.course_id] = (totalTestsByCourse[t.course_id] || 0) + 1; });

  // Distinct tests attempted per course + best score per test (for course mastery)
  const takenTestsByCourse = {};   // course_id -> Set of test_id
  const bestByTest = {};           // test_id -> best percentage
  (attempts || []).forEach(a => {
    const cid = a.practice_tests?.course_id;
    if (cid) (takenTestsByCourse[cid] ||= new Set()).add(a.test_id);
    const p = a.percentage || 0;
    if (bestByTest[a.test_id] === undefined || p > bestByTest[a.test_id]) bestByTest[a.test_id] = p;
  });
  const testsTakenCount = cid => (takenTestsByCourse[cid] ? takenTestsByCourse[cid].size : 0);
  const courseAvgTest = cid => {
    const ids = takenTestsByCourse[cid] ? [...takenTestsByCourse[cid]] : [];
    if (!ids.length) return null;
    return Math.round(ids.reduce((s, id) => s + (bestByTest[id] || 0), 0) / ids.length);
  };

  // Stats
  const totalLessons  = Object.values(totalByCourse).reduce((a,b) => a+b, 0);
  const doneLessons   = Object.values(compByCourse).reduce((a,b) => a+b, 0);
  const passedTests   = (attempts || []).filter(a => a.passed).length;
  const gradedSubs    = (submissions || []).filter(s => s.score !== null);
  const avgScore      = gradedSubs.length
    ? Math.round(gradedSubs.reduce((s, sub) => s + (sub.score / (sub.assignments?.max_score || sub.score || 1) * 100), 0) / gradedSubs.length)
    : null;
  const avgTest       = (attempts || []).length
    ? Math.round((attempts || []).reduce((s, a) => s + (a.percentage || 0), 0) / (attempts || []).length)
    : null;

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="stat-row">
      <div class="mini-stat"><div class="mini-stat-val">${doneLessons}</div><div class="mini-stat-lbl">Lessons Completed</div></div>
      <div class="mini-stat"><div class="mini-stat-val">${(attempts||[]).length}</div><div class="mini-stat-lbl">Tests Taken</div></div>
      <div class="mini-stat"><div class="mini-stat-val">${avgTest !== null ? avgTest + '%' : '—'}</div><div class="mini-stat-lbl">Avg. Test Score</div></div>
      <div class="mini-stat"><div class="mini-stat-val">${avgScore !== null ? avgScore + '%' : '—'}</div><div class="mini-stat-lbl">Avg. Assignment</div></div>
    </div>

    <div class="progress-section">
      <div class="section-heading">Course Completion</div>
      ${courses.length === 0
        ? '<div class="empty-state" style="padding:20px 0"><div class="empty-title">No Courses</div></div>'
        : courses.map(c => {
          const doneL  = compByCourse[c.id] || 0;
          const totalL = totalByCourse[c.id] || 0;
          const doneT  = testsTakenCount(c.id);
          const totalT = totalTestsByCourse[c.id] || 0;
          // Combined completion: lessons watched + tests attempted, over everything in the course
          const totalItems = totalL + totalT;
          const doneItems  = Math.min(doneL, totalL) + Math.min(doneT, totalT);
          const pct        = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;
          const mastery    = courseAvgTest(c.id);
          const complete   = totalItems > 0 && doneItems >= totalItems;
          return `
            <div class="course-progress-card">
              <div class="cp-header">
                <div class="cp-title">${escHtml(c.title)}${complete ? ' <span class="badge badge-success" style="font-size:.62rem;margin-left:6px">Complete ✓</span>' : ''}</div>
                <div class="cp-pct">${pct}%</div>
              </div>
              <div class="big-prog"><div class="big-prog-fill" style="width:${pct}%"></div></div>
              <div class="cp-breakdown">
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg> ${doneL} / ${totalL} lessons</span>
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg> ${doneT} / ${totalT} tests</span>
                ${mastery !== null ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${mastery}% avg score</span>` : ''}
              </div>
            </div>`;
        }).join('')}
    </div>

    <div class="progress-section">
      <div class="section-heading">Test History</div>
      ${(attempts||[]).length === 0
        ? '<div class="empty-state" style="padding:20px 0"><div class="empty-title">No attempts yet</div></div>'
        : `<div class="card"><div class="card-body" style="padding:4px 16px">
          ${(attempts||[]).map(a => `
            <div class="test-history-row">
              <span class="badge ${a.passed ? 'badge-success' : 'badge-danger'}" style="font-size:.65rem">${a.passed ? 'Pass' : 'Fail'}</span>
              <div class="th-name">${escHtml(a.practice_tests?.title || 'Test')}</div>
              <div class="th-score">${a.percentage}%</div>
              <div class="th-date">${fmtDate(a.completed_at)}</div>
            </div>`).join('')}
          </div></div>`}
    </div>

    <div class="progress-section">
      <div class="section-heading">Assignments</div>
      ${(submissions||[]).length === 0
        ? '<div class="empty-state" style="padding:20px 0"><div class="empty-title">No submissions yet</div></div>'
        : `<div class="card"><div class="card-body" style="padding:4px 16px">
          ${submissions.map(s => `
            <div class="test-history-row">
              ${s.score !== null
                ? `<span class="badge badge-success" style="font-size:.65rem">Graded</span>`
                : `<span class="badge badge-warning" style="font-size:.65rem">Pending</span>`}
              <div class="th-name">${escHtml(s.assignments?.title || 'Assignment')}</div>
              <div class="th-score">${s.score !== null ? s.score + '/' + (s.assignments?.max_score || '?') : '—'}</div>
            </div>`).join('')}
          </div></div>`}
    </div>`;
})();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
</html>
