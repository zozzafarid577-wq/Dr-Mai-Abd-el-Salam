<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">My Scores &amp; Notes</span>
    </div>
  </header>

  <main class="content">

    <div class="notes-card">
      <div class="section-h">My Notes</div>
      <textarea class="notes-area" id="notes" placeholder="Write anything you want to remember — key facts, mistakes to review, reminders…"></textarea>
      <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="saveNotes()" id="save-notes-btn">Save Notes</button>
        <span id="notes-status" style="font-size:.76rem;color:var(--muted)"></span>
      </div>
    </div>

    <div class="section-h">🏁 Saved Scores</div>
    <div id="scores-body">
      <div class="skeleton" style="height:78px;border-radius:11px;margin-bottom:9px"></div>
      <div class="skeleton" style="height:78px;border-radius:11px;margin-bottom:9px"></div>
    </div>

  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let profile = null;

(async () => {
  profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const [{ data: attempts }, { data: note }] = await Promise.all([
    sb.from('test_attempts')
      .select('id, test_id, score, max_score, percentage, passed, completed_at, practice_tests(title, is_mock)')
      .eq('student_id', profile.id)
      .not('completed_at', 'is', null)
      .order('completed_at', { ascending: false }),
    sb.from('student_notes').select('content').eq('student_id', profile.id).maybeSingle(),
  ]);

  if (note && typeof note.content === 'string') document.getElementById('notes').value = note.content;
  renderScores(attempts || []);
})();

function renderScores(attempts) {
  const body = document.getElementById('scores-body');
  if (!attempts.length) {
    body.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:46px;height:46px;color:var(--muted)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-title">No results yet</div><div class="empty-sub">Take a practice test and your scores will be saved here.</div></div>';
    return;
  }
  body.innerHTML = attempts.map(a => {
    const pct = a.percentage != null ? Math.round(a.percentage) : 0;
    const color = a.passed ? '#16a34a' : (pct >= 40 ? 'var(--warning)' : '#dc2626');
    return `
      <div class="score-row">
        <div class="score-pct" style="color:${color}">${pct}%</div>
        <div class="score-info">
          <div class="score-name">${escHtml(a.practice_tests?.title || 'Test')}${a.practice_tests?.is_mock ? ' <span class="badge badge-warning" style="font-size:.6rem">Mock</span>' : ''}</div>
          <div class="score-meta">${a.score ?? '—'} / ${a.max_score ?? '—'} correct · ${fmtDate(a.completed_at)} · <span style="color:${a.passed ? '#16a34a' : '#dc2626'};font-weight:700">${a.passed ? 'Passed' : 'Not passed'}</span></div>
        </div>
        <a class="btn btn-outline btn-sm" href="/portal/attempt.html?id=${encodeURIComponent(a.id)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          Review &amp; Print
        </a>
      </div>`;
  }).join('');
}

async function saveNotes() {
  const btn = document.getElementById('save-notes-btn');
  const status = document.getElementById('notes-status');
  btn.disabled = true; btn.textContent = 'Saving…';
  const content = document.getElementById('notes').value;
  const { error } = await sb.from('student_notes')
    .upsert({ student_id: profile.id, content, updated_at: new Date().toISOString() }, { onConflict: 'student_id' });
  btn.disabled = false; btn.textContent = 'Save Notes';
  if (error) { status.textContent = 'Could not save: ' + error.message; status.style.color = '#dc2626'; return; }
  status.textContent = '✓ Saved'; status.style.color = 'var(--muted)';
  setTimeout(() => { status.textContent = ''; }, 2500);
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
