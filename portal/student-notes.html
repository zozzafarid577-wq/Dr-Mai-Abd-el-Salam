<style>
.pdf-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px; }
.pdf-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,box-shadow .15s; }
.pdf-card:hover { border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.08); }
.pdf-icon { width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.pdf-icon svg { width:22px;height:22px; }
.pdf-icon.summary { background:#eff6ff;color:#2563eb; }
.pdf-icon.cheat { background:#fffbeb;color:#b45309; }
.pdf-icon.retest { background:#f0fdf4;color:#16a34a; }
.cat-pill.retest { background:#f0fdf4;color:#166534; }
.pdf-icon.note { background:#faf5ff;color:#7c3aed; }
.cat-pill.note { background:#faf5ff;color:#6d28d9; }
.pdf-name { font-size:.88rem;font-weight:700;color:var(--text);line-height:1.35; }
.pdf-meta { font-size:.72rem;color:var(--muted); }
.cat-pill { font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;align-self:flex-start; }
.cat-pill.summary { background:#eff6ff;color:#2563eb; }
.cat-pill.cheat { background:#fffbeb;color:#b45309; }
.pdf-dl { margin-top:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none; }
</style>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Student Notes</span>
    </div>
  </header>
  <main class="content">
    <div id="pdf-grid" class="pdf-grid">
      <div class="skeleton" style="height:140px;border-radius:12px"></div>
      <div class="skeleton" style="height:140px;border-radius:12px"></div>
    </div>

<div class="toast-wrap" id="toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
const CATS = ['note'];
(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;
  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enr } = await sb.from('enrollments').select('course_id').eq('student_id', profile.id);
  const courseIds = (enr || []).map(e => e.course_id);
  const grid = document.getElementById('pdf-grid');
  if (!courseIds.length) { grid.innerHTML = empty(); return; }

  const { data: pdfs } = await sb.from('module_pdfs')
    .select('id, title, category, created_at, modules(course_id, title, courses(title))')
    .in('category', CATS)
    .order('created_at', { ascending: false });

  const items = (pdfs || []).filter(p => courseIds.includes(p.modules?.course_id));
  if (!items.length) { grid.innerHTML = empty(); return; }

  grid.innerHTML = items.map(p => `
      <div class="pdf-card">
        <div class="pdf-icon note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
        <span class="cat-pill note">Student note</span>
        <div>
          <div class="pdf-name">${escHtml(p.title)}</div>
          <div class="pdf-meta">${escHtml(p.modules?.courses?.title || '')} · ${escHtml(p.modules?.title || '')}</div>
        </div>
        <a class="pdf-dl" href="/portal/viewer.html?id=${encodeURIComponent(p.id)}&src=module">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          Open
        </a>
      </div>`).join('');
})();

function empty() {
  return '<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-title">No student notes yet</div><div class="empty-sub">Helpful notes from past students will appear here once added.</div></div>';
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
</script>
