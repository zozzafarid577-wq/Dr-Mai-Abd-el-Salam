.pdf-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px; }
.pdf-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,box-shadow .15s; }
.pdf-card:hover { border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.08); }
.pdf-icon { width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.pdf-icon svg { width:22px;height:22px; }
.pdf-icon.summary { background:#EEF0F4;color:#6B7C98; }
.pdf-icon.cheat { background:#fffbeb;color:#b45309; }
.pdf-icon.retest { background:#f0fdf4;color:#16a34a; }
.cat-pill.retest { background:#f0fdf4;color:#166534; }
.pdf-icon.note { background:#faf5ff;color:#7c3aed; }
.cat-pill.note { background:#faf5ff;color:#6d28d9; }
.pdf-name { font-size:.88rem;font-weight:700;color:var(--text);line-height:1.35; }
.pdf-meta { font-size:.72rem;color:var(--muted); }
.cat-pill { font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;align-self:flex-start; }
.cat-pill.summary { background:#EEF0F4;color:#6B7C98; }
.cat-pill.cheat { background:#fffbeb;color:#b45309; }
.pdf-dl { margin-top:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none; }
.note-body { font-size:.82rem;color:var(--text-2);line-height:1.55;white-space:pre-wrap;max-height:200px;overflow:auto; }

<script src="/js/auth.js"></script>
<script>
(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;
  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const grid = document.getElementById('pdf-grid');
  const { data: notes, error } = await sb.from('shared_notes')
    .select('id, title, body, file_url, audience, created_at')
    .eq('is_active', true)
    .order('created_at', { ascending: false });

  if (error) { grid.innerHTML = errBox(error.message); return; }

  // Audience filter: 'all' → everyone, 'revision' → any revision student,
  // 'act'/'est' → that revision track only.
  const canSee = a => {
    if (a === 'act') return isActRevisionStudent();
    if (a === 'est') return isEstRevisionStudent();
    if (a === 'revision') return isRevisionStudent();
    return true;
  };
  const visible = (notes || []).filter(n => canSee(n.audience));
  if (!visible.length) { grid.innerHTML = empty(); return; }

  grid.innerHTML = visible.map(n => {
    const hasFile = !!n.file_url;
    const icon = hasFile
      ? '<div class="pdf-icon cheat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>'
      : '<div class="pdf-icon note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>';
    return `
      <div class="pdf-card">
        ${icon}
        <span class="cat-pill ${hasFile ? 'cheat' : 'note'}">${hasFile ? 'Note + file' : 'Student note'}</span>
        <div>
          <div class="pdf-name">${escHtml(n.title)}</div>
          <div class="pdf-meta">${fmtDate(n.created_at)}</div>
        </div>
        ${n.body ? `<div class="note-body">${escHtml(n.body)}</div>` : ''}
        ${hasFile ? `<button class="pdf-dl" style="border:none;cursor:pointer" data-url="${escAttr(n.file_url)}" onclick="openNoteFile(this.dataset.url)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          Open file</button>` : ''}
      </div>`;
  }).join('');
})();

function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }

// Open a note's attachment INSIDE the portal (no redirect to Drive).
function embedUrl(url) {
  let m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  m = url.match(/[?&]id=([^&]+)/);
  if (m && /drive\.google\.com/.test(url)) return `https://drive.google.com/file/d/${m[1]}/preview`;
  if (/docs\.google\.com\/document\/d\/([^/]+)/.test(url)) return url.replace(/\/(edit|view)[^]*$/, '/preview');
  return url;
}
function openNoteFile(url) {
  document.getElementById('file-frame').src = embedUrl(url);
  document.getElementById('file-overlay').style.display = 'flex';
}
function closeNoteFile() {
  document.getElementById('file-overlay').style.display = 'none';
  document.getElementById('file-frame').src = 'about:blank';
}

function empty() {
  return '<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-title">No student notes yet</div><div class="empty-sub">Helpful notes will appear here once your instructor adds them.</div></div>';
}
function errBox(msg){ return `<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">Couldn’t load notes</div><div class="empty-sub">${escHtml(msg)} (run migration v24?)</div></div>`; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
</script>

<!-- In-portal file viewer (opens note attachments without leaving the site) -->
<div id="file-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(8,12,24,.9);flex-direction:column">
  <div style="display:flex;justify-content:flex-end;padding:10px">
    <button onclick="closeNoteFile()" style="background:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:800;cursor:pointer;font-size:.85rem">✕ Close</button>
  </div>
  <iframe id="file-frame" title="Attachment" style="flex:1;width:100%;border:none;background:#fff"></iframe>
</div>
