<!DOCTYPE html>

<link rel="stylesheet" href="/css/portal.css">
<style>
.test-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:flex-start;gap:16px;margin-bottom:12px;transition:border-color .15s; }
.test-card:hover { border-color:var(--primary); }
.test-icon { width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#1a56db,#0e38b1);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.test-icon svg { width:22px;height:22px;color:#fff; }
.test-info { flex:1;min-width:0; }
.test-name { font-size:.92rem;font-weight:700;color:var(--text); }
.test-meta { font-size:.75rem;color:var(--muted);margin-top:4px; }
.test-actions { display:flex;gap:8px;margin-top:12px;flex-wrap:wrap; }
.attempt-row { font-size:.75rem;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:inline-flex;align-items:center;gap:6px;color:var(--text-2); }

/* Test runner modal */
.runner-modal { max-width:700px;width:100%; }
.runner-header { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
.runner-timer { margin-left:auto;font-size:1rem;font-weight:700;color:var(--primary); }
.q-num { font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px; }
.q-text { font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:16px;line-height:1.5; }
.q-options { display:flex;flex-direction:column;gap:8px; }
.q-opt { display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s;font-size:.88rem;font-weight:500; }
.q-opt:hover { border-color:var(--primary);background:rgba(26,86,219,.04); }
.q-opt.selected { border-color:var(--primary);background:rgba(26,86,219,.08); }
.q-opt.correct { border-color:#16a34a;background:#f0fdf4;color:#166534; }
.q-opt.wrong { border-color:#dc2626;background:#fef2f2;color:#991b1b; }
.opt-letter { width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0; }
.q-nav { display:flex;justify-content:space-between;align-items:center;margin-top:24px; }
.progress-dots { display:flex;gap:4px;flex-wrap:wrap; }
.dot { width:10px;height:10px;border-radius:50%;background:var(--border); }
.dot.answered { background:var(--primary); }
.dot.current { background:var(--primary);outline:2px solid rgba(26,86,219,.3);outline-offset:2px; }
.result-block { text-align:center;padding:20px 0; }
.result-score { font-size:3rem;font-weight:900;color:var(--primary); }
.result-label { font-size:.88rem;color:var(--muted);margin-top:4px; }
.result-badge { display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;margin-top:8px; }
</style>
</head>
<body>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Practice Tests</span>
    </div>
  </header>

  <main class="content">
    <div id="tests-body">
      <div class="skeleton" style="height:100px;border-radius:12px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:100px;border-radius:12px;margin-bottom:12px"></div>
    </div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let profile = null;
let tests = [];
let attemptsMap = {};
let modulesData = [];
let moduleMap   = {};

// Runner state
let runnerTest = null;
let questions  = [];
let answers    = {};
let currentQ   = 0;
let timerInterval = null;
let secondsLeft   = 0;
let finished      = false;

const LETTERS = ['A','B','C','D','E'];

(async () => {
  profile = await requireAuth('student');
  if (!profile) return;

  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  const { data: enrollments } = await sb
    .from('enrollments')
    .select('course_id')
    .eq('student_id', profile.id);

  const courseIds = (enrollments || []).map(e => e.course_id);
  if (!courseIds.length) { renderTests(); return; }

  const [{ data: mods }, { data: testsData }, { data: attempts }] = await Promise.all([
    sb.from('modules').select('id, title, course_id, order_index').in('course_id', courseIds).order('order_index'),
    sb.from('practice_tests').select('id, title, module_id, course_id, time_limit_min, is_active').in('course_id', courseIds).eq('is_active', true).eq('is_mock', false).order('created_at'),
    sb.from('test_attempts').select('id, test_id, percentage, passed, created_at').eq('student_id', profile.id).order('created_at', { ascending: false })
  ]);

  modulesData = mods || [];
  moduleMap   = {};
  modulesData.forEach(m => { moduleMap[m.id] = m; });

  tests = testsData || [];

  attemptsMap = {};
  (attempts || []).forEach(a => {
    if (!attemptsMap[a.test_id]) attemptsMap[a.test_id] = [];
    attemptsMap[a.test_id].push(a);
  });

  renderTests();

  // Deep link from assignments (?id=...) → go straight to the test page
  const targetId = new URLSearchParams(location.search).get('id');
  if (targetId && tests.find(t => t.id === targetId)) {
    startTest(targetId);
  }
})();

function renderTests() {
  const body = document.getElementById('tests-body');
  if (tests.length === 0) {
    body.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted)"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><div class="empty-title">No Tests Yet</div><div class="empty-sub">Practice tests will appear here once your instructor adds them.</div></div>';
    return;
  }

  // Group by module_id
  const byModule = {};
  tests.forEach(t => { (byModule[t.module_id || '__none__'] ||= []).push(t); });

  // Render in module order, then unassigned at end
  let html = '';
  modulesData.forEach(m => {
    if (!byModule[m.id]) return;
    html += `<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:6px 2px 8px">${escHtml(m.title)}</div>`;
    html += byModule[m.id].map(t => renderTestCard(t)).join('');
  });
  if (byModule['__none__']) {
    html += byModule['__none__'].map(t => renderTestCard(t)).join('');
  }
  body.innerHTML = html;
}

function renderTestCard(t) {
  const myAttempts = attemptsMap[t.id] || [];
  const best = myAttempts.length ? Math.max(...myAttempts.map(a => a.percentage || 0)) : null;
  const attemptBadges = myAttempts.slice(0, 3).map(a =>
    `<span class="attempt-row"><span class="badge ${a.passed ? 'badge-success' : 'badge-danger'}" style="font-size:.65rem">${a.passed ? 'Pass' : 'Fail'}</span> ${a.percentage}%</span>`
  ).join('');

  return `
    <div class="test-card">
      <div class="test-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      </div>
      <div class="test-info">
        <div class="test-name">${escHtml(t.title)}</div>
        <div class="test-meta">${t.time_limit_min ? t.time_limit_min + ' min' : 'Untimed'} · ${myAttempts.length} attempt${myAttempts.length !== 1 ? 's' : ''}${best !== null ? ' · Best: ' + best + '%' : ''}</div>
        ${myAttempts.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${attemptBadges}</div>` : ''}
        <div class="test-actions">
          <button class="btn btn-primary btn-sm" onclick="startTest('${t.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ${myAttempts.length ? 'Retake' : 'Start Test'}
          </button>
        </div>
      </div>
    </div>`;
}

function startTest(testId) {
  // Take the test on a dedicated full page (shows score + review + emails parent)
  location.href = '/portal/take-test.html?id=' + encodeURIComponent(testId);
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
