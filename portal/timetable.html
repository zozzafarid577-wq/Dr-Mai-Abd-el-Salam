<!DOCTYPE html>
<html lang="en">
<head>

<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
.cd-banner { border-radius:16px;padding:22px 24px;margin-bottom:26px;color:#fff;background:linear-gradient(135deg,#1d4ed8,#0e2a82);box-shadow:var(--shadow-md); }
.cd-label { font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;opacity:.85; }
.cd-event { font-size:1.05rem;font-weight:800;margin:6px 0 14px; }
.cd-clock { display:flex;gap:10px;flex-wrap:wrap; }
.cd-unit { background:rgba(255,255,255,.14);border-radius:10px;padding:10px 14px;min-width:64px;text-align:center; }
.cd-num { font-size:1.7rem;font-weight:900;line-height:1; }
.cd-u { font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;opacity:.85;margin-top:4px; }

.tt-tabs { display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap; }
.tt-tab { padding:8px 18px;border-radius:22px;border:1.5px solid var(--border);background:var(--surface);font-size:.82rem;font-weight:700;cursor:pointer;color:var(--text-2); }
.tt-tab.act.active { background:#1d4ed8;border-color:#1d4ed8;color:#fff; }
.tt-tab.est.active { background:#f4c20d;border-color:#f4c20d;color:#3a2f00; }

.exam-card { border:1px solid var(--border);border-radius:13px;padding:16px 18px;margin-bottom:12px;background:var(--surface);border-left-width:5px; }
.exam-card.act { border-left-color:#1d4ed8; }
.exam-card.est { border-left-color:#f4c20d; }
.exam-card.past { opacity:.5; }
.exam-head { display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px; }
.exam-title { font-size:.98rem;font-weight:800;color:var(--text); }
.type-pill { font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px; }
.type-pill.act { background:#dbeafe;color:#1d4ed8; }
.type-pill.est { background:#fef3c7;color:#92670a; }
.next-pill { font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px;background:#dcfce7;color:#166534; }
.exam-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px; }
.exam-field { background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px; }
.ef-label { font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted); }
.ef-val { font-size:.84rem;font-weight:700;color:var(--text);margin-top:3px; }
.ef-val.sub { font-weight:500;color:var(--text-2); }
</style>
</head>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Exam Timetable</span>
    </div>
  </header>

  <main class="content">
    <div class="cd-banner" id="cd-banner">
      <div class="cd-label">Counting down to the next key date</div>
      <div class="cd-event" id="cd-event">…</div>
      <div class="cd-clock" id="cd-clock"></div>
    </div>

    <div class="tt-tabs">
      <button class="tt-tab act active" id="tab-act" onclick="setTab('act')">ACT Trials</button>
      <button class="tt-tab est" id="tab-est" onclick="setTab('est')">EST Trials</button>
    </div>

    <div id="tt-body"></div>

<div class="toast-wrap" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
// ── ACT trial schedule (blue) ──────────────────────────────────
const ACT = [
  { month:'September 2026', open:'2026-06-01', close:'2026-09-10', test:'2026-09-19', am:'Math 1', pm:'Chemistry, English 1, English 2' },
  { month:'October 2026',   open:'2026-06-01', close:'2026-10-22', test:'2026-10-31', am:'Math 1', pm:'Biology, Math 2' },
  { month:'November 2026',  open:'2026-06-01', close:'2026-11-19', test:'2026-11-28', am:'Math 1', pm:'Biology, Math 2' },
  { month:'February 2027',  open:'2026-06-08', close:'2027-02-11', test:'2027-02-20', am:'Math 1', pm:'Chemistry, English 1' },
  { month:'April 2027',     open:'2026-06-08', close:'2027-04-01', test:'2027-04-10', am:'Math 1', pm:'Biology, Math 2, English 2' },
  { month:'June 2027',      open:'2026-06-08', close:'2027-06-10', test:'2027-06-19', am:'Math 1', pm:'English 2' },
  { month:'July 2027',      open:'2026-06-08', close:'2027-07-08', test:'2027-07-18', am:'Math 1', pm:'Biology, English 1' },
];
// Official registration links (replace with Dr Mai's exact links if different).
const ACT_REG_URL = 'https://www.act.org/content/act/en/products-and-services/the-act/registration.html';
const EST_REG_URL = 'https://www.estegypt.org/';
// ── EST trial registration windows (yellow) ────────────────────
const EST = [
  { subjects:'Math Level 1-2, Biology, Chemistry',         from:'2025-12-09', to:'2025-12-29' },
  { subjects:'Math Level 1-2, Biology, Physics',           from:'2026-02-10', to:'2026-03-02' },
  { subjects:'Math Level 1-2, Biology, Physics, Chemistry',from:'2026-03-31', to:'2026-04-20' },
  { subjects:'Math Level 1-2, Biology, Physics, Chemistry',from:'2026-05-19', to:'2026-06-08' },
  { subjects:'Math Level 1-2, Biology, Physics',           from:'2026-08-25', to:'2026-09-14' },
  { subjects:'Math Level 1-2, Biology, Chemistry',         from:'2026-10-27', to:'2026-11-16' },
];

let activeTab = 'act';
let countdownTarget = null;

(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;
  document.getElementById('u-name').textContent = profile.full_name;
  document.getElementById('u-av').textContent   = initials(profile.full_name);

  pickCountdown();
  render();
  tickCountdown();
  setInterval(tickCountdown, 1000);
})();

function fmt(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

// Nearest upcoming "primary" date: ACT exam day, or EST registration close.
function pickCountdown() {
  const now = Date.now();
  const events = [];
  ACT.forEach(e => events.push({ date:new Date(e.test+'T00:00:00').getTime(), label:`ACT ${e.month} exam`, type:'act' }));
  EST.forEach(e => events.push({ date:new Date(e.to+'T23:59:59').getTime(), label:`EST registration closes (${e.subjects})`, type:'est' }));
  const upcoming = events.filter(e => e.date > now).sort((a,b) => a.date - b.date);
  countdownTarget = upcoming[0] || null;
}

function tickCountdown() {
  const ev = document.getElementById('cd-event');
  const clock = document.getElementById('cd-clock');
  const banner = document.getElementById('cd-banner');
  if (!countdownTarget) { ev.textContent = 'No upcoming dates scheduled.'; clock.innerHTML = ''; return; }
  let diff = countdownTarget.date - Date.now();
  if (diff <= 0) { pickCountdown(); diff = countdownTarget ? countdownTarget.date - Date.now() : 0; }
  ev.textContent = countdownTarget.label;
  banner.style.background = countdownTarget.type === 'est'
    ? 'linear-gradient(135deg,#f4c20d,#b88600)'
    : 'linear-gradient(135deg,#1d4ed8,#0e2a82)';
  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff%86400000/3600000);
  const m = Math.floor(diff%3600000/60000);
  const s = Math.floor(diff%60000/1000);
  clock.innerHTML = [['Days',d],['Hours',h],['Mins',m],['Secs',s]]
    .map(([u,v]) => `<div class="cd-unit"><div class="cd-num">${String(v).padStart(2,'0')}</div><div class="cd-u">${u}</div></div>`).join('');
}

function setTab(t) {
  activeTab = t;
  document.getElementById('tab-act').classList.toggle('active', t==='act');
  document.getElementById('tab-est').classList.toggle('active', t==='est');
  render();
}

function render() {
  const body = document.getElementById('tt-body');
  const now = Date.now();
  if (activeTab === 'act') {
    body.innerHTML = ACT.map(e => {
      const past = new Date(e.test+'T00:00:00').getTime() < now;
      const isNext = countdownTarget && countdownTarget.type==='act' && countdownTarget.label.includes(e.month);
      return `
        <div class="exam-card act${past?' past':''}">
          <div class="exam-head">
            <span class="type-pill act">ACT</span>
            <span class="exam-title">${e.month}</span>
            ${isNext ? '<span class="next-pill">Next up</span>' : ''}
          </div>
          <div class="exam-grid">
            <div class="exam-field"><div class="ef-label">Registration opens</div><div class="ef-val">${fmt(e.open)}</div></div>
            <div class="exam-field"><div class="ef-label">Registration closes</div><div class="ef-val">${fmt(e.close)}</div></div>
            <div class="exam-field"><div class="ef-label">Test day</div><div class="ef-val">${fmt(e.test)}</div></div>
            <div class="exam-field"><div class="ef-label">Morning</div><div class="ef-val sub">${e.am}</div></div>
            <div class="exam-field"><div class="ef-label">Afternoon</div><div class="ef-val sub">${e.pm}</div></div>
          </div>
          <a href="${ACT_REG_URL}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="margin-top:12px">Register for ACT →</a>
        </div>`;
    }).join('');
  } else {
    body.innerHTML = EST.map(e => {
      const past = new Date(e.to+'T23:59:59').getTime() < now;
      const isNext = countdownTarget && countdownTarget.type==='est' && countdownTarget.label.includes(e.subjects);
      return `
        <div class="exam-card est${past?' past':''}">
          <div class="exam-head">
            <span class="type-pill est">EST</span>
            <span class="exam-title">${fmt(e.from)} → ${fmt(e.to)}</span>
            ${isNext ? '<span class="next-pill">Next up</span>' : ''}
          </div>
          <div class="exam-grid">
            <div class="exam-field"><div class="ef-label">Registration opens</div><div class="ef-val">${fmt(e.from)}</div></div>
            <div class="exam-field"><div class="ef-label">Registration closes</div><div class="ef-val">${fmt(e.to)}</div></div>
            <div class="exam-field" style="grid-column:1/-1"><div class="ef-label">Subjects</div><div class="ef-val sub">${e.subjects}</div></div>
          </div>
          <a href="${EST_REG_URL}" target="_blank" rel="noopener" class="btn btn-sm" style="margin-top:12px;background:#f4c20d;color:#3a2f00;border:none">Register for EST →</a>
        </div>`;
    }).join('');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
</script>
