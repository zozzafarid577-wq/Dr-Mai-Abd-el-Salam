<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Viewing PDF | Student Portal</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="/css/portal.css">
<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
html, body { height: 100%; }
.viewer-shell { position: fixed; inset: 0; display: flex; flex-direction: column; background: #1a1d29; }
.viewer-bar {
  height: 54px; flex-shrink: 0; display: flex; align-items: center; gap: 14px;
  padding: 0 18px; background: #0d1021; color: #fff; border-bottom: 1px solid rgba(255,255,255,.08);
}
.viewer-bar .back { display: inline-flex; align-items: center; gap: 7px; color: #c7d2fe; font-size: .82rem; font-weight: 700; cursor: pointer; }
.viewer-bar .back svg { width: 16px; height: 16px; }
.viewer-title { font-size: .86rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.viewer-tag { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #8b93a7; }
.viewer-stage { position: relative; flex: 1; overflow: hidden; }
.viewer-stage iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #525659; }

/* Repeating diagonal watermark across the document — name + email + date.
   pointer-events:none so it never blocks scrolling. */
.wm-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden;
  display: flex; flex-wrap: wrap; align-content: center; justify-content: center;
  transform: rotate(-28deg) scale(1.4); opacity: .9;
}
.wm-cell { width: 300px; text-align: center; color: rgba(71,85,105,.16); font-size: .78rem; font-weight: 700; padding: 46px 0; user-select: none; }
.dl-btn { display:inline-flex; align-items:center; gap:6px; background:#2563eb; color:#fff; border:none; border-radius:8px; padding:7px 13px; font-size:.78rem; font-weight:700; cursor:pointer; }
.dl-btn:disabled { opacity:.5; cursor:not-allowed; }
.dl-btn svg { width:14px; height:14px; }

.viewer-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #cbd5e1; flex-direction: column; gap: 10px; text-align: center; padding: 24px; }
.viewer-msg .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,.18); border-top-color: #818cf8; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="viewer-shell">
  <div class="viewer-bar">
    <span class="back" onclick="history.length > 1 ? history.back() : location.href='/portal/pdfs.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </span>
    <span class="viewer-title" id="v-title">Loading…</span>
    <button class="dl-btn" id="dl-btn" onclick="downloadWatermarked()" style="display:none" title="Download a copy stamped with your email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
  </div>
  <div class="viewer-stage" id="stage">
    <div class="viewer-msg"><div class="spinner"></div><div>Preparing document…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="/js/auth.js"></script>
<script>
let pdfUrl = null, pdfTitle = '', myEmail = '';
(async () => {
  const profile = await requireAuth('student');
  if (!profile) return;
  if (!profile.email) { const s = await getSession(); profile.email = s?.user?.email || ''; }
  myEmail = profile.email || '';

  const params = new URLSearchParams(location.search);
  const id  = params.get('id');
  const src = params.get('src') === 'lesson' ? 'lesson' : 'module';
  const stage = document.getElementById('stage');

  if (!id) { stage.innerHTML = msg('No document specified.'); return; }

  let data;
  try {
    const session = await getSession();
    const resp = await fetch('/api/student-activity', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify({ action: 'signed-pdf', pdf_id: id, source: src }),
    });
    data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Could not open document');
  } catch (e) {
    stage.innerHTML = msg(e.message);
    return;
  }

  document.getElementById('v-title').textContent = data.title || 'Document';
  pdfUrl = data.url; pdfTitle = data.title || 'document';
  const dl = document.getElementById('dl-btn'); if (dl) dl.style.display = '';

  // Hide the browser PDF toolbar (download/print) where supported, and embed.
  const sep = data.url.includes('#') ? '&' : '#';
  const embedUrl = data.url + sep + 'toolbar=0&navpanes=0&scrollbar=0&view=FitH';

  const wm = watermark(profile.email || profile.full_name || '');
  stage.innerHTML = `<iframe src="${embedUrl.replace(/"/g, '&quot;')}" title="PDF"></iframe>${wm}`;
})();

function watermark(label) {
  const cells = Array.from({ length: 60 }, () => `<div class="wm-cell">${escHtml(label)}</div>`).join('');
  return `<div class="wm-overlay">${cells}</div>`;
}

// Download a copy of the PDF with the student's email stamped on every page.
async function downloadWatermarked() {
  const btn = document.getElementById('dl-btn');
  if (!pdfUrl || !window.PDFLib) { alert('Download is not ready yet.'); return; }
  const orig = btn.innerHTML; btn.disabled = true; btn.textContent = 'Preparing…';
  try {
    const bytes = await fetch(pdfUrl).then(r => { if (!r.ok) throw new Error('Could not fetch the file'); return r.arrayBuffer(); });
    const { PDFDocument, StandardFonts, rgb, degrees } = PDFLib;
    const doc = await PDFDocument.load(bytes);
    const font = await doc.embedFont(StandardFonts.Helvetica);
    const stamp = myEmail || 'Dr Mai Portal';
    doc.getPages().forEach(p => {
      const { width, height } = p.getSize();
      for (let y = 30; y < height + 60; y += 150) {
        for (let x = -60; x < width; x += 270) {
          p.drawText(stamp, { x, y, size: 11, font, color: rgb(0.44, 0.5, 0.6), opacity: 0.18, rotate: degrees(-27) });
        }
      }
    });
    const out = await doc.save();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([out], { type: 'application/pdf' }));
    a.download = (pdfTitle || 'document').replace(/[^\w\- ]+/g, '').trim() + '.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  } catch (e) {
    alert('Could not prepare the download: ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
}
function msg(text) {
  return `<div class="viewer-msg"><div style="font-size:1rem;font-weight:700;color:#fff">Can't open this document</div><div style="font-size:.85rem">${escHtml(text)}</div></div>`;
}

// Light deterrents: block right-click and text selection on the viewer.
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
