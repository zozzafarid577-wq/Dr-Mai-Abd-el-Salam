<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>New Password | Dr Mai Abd El Salam</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1d4ed8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.wrap{width:100%;max-width:420px}

.card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,.25)}

.card-logo{margin-bottom:28px}
.card-logo-name{font-size:1rem;font-weight:800;letter-spacing:-.02em;color:#0f172a}
.card-logo-name span{color:#2563eb}

.card h1{font-size:1.55rem;font-weight:900;letter-spacing:-.03em;color:#0f172a;margin-bottom:6px}
.card-sub{font-size:.84rem;color:#64748b;margin-bottom:28px}

.alert-box{display:none;padding:12px 16px;border-radius:10px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.alert-box.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.alert-box.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

.field{margin-bottom:18px}
.field-label{font-size:.75rem;font-weight:600;color:#374151;margin-bottom:7px;letter-spacing:.01em;display:block}
.pw-wrap{position:relative}
.field input{
  width:100%;padding:11px 14px;
  border:1.5px solid #e2e8f0;border-radius:10px;
  font-size:.875rem;font-family:inherit;color:#0f172a;
  outline:none;transition:border-color .18s,box-shadow .18s;
  background:#f8fafc;
}
.pw-wrap input{padding-right:72px}
.field input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.field input::placeholder{color:#cbd5e1}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:.7rem;font-weight:700;color:#2563eb;cursor:pointer;padding:4px 6px}

.strength-wrap{margin-top:8px}
.strength-track{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-lbl{font-size:.68rem;color:#64748b;margin-top:4px;font-weight:600;height:14px}

.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;border:none;border-radius:10px;
  font-size:.875rem;font-weight:700;font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
  transition:transform .15s,box-shadow .15s;
  margin-top:8px;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed;transform:none}

.invalid-state{text-align:center;padding:20px 0}
.invalid-state p{font-size:.85rem;color:#64748b;margin-bottom:20px;line-height:1.6}
.invalid-btn{display:inline-block;padding:11px 24px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-radius:10px;font-size:.82rem;font-weight:700;box-shadow:0 4px 14px rgba(37,99,235,.35)}

.foot{text-align:center;margin-top:24px}
.foot a{font-size:.78rem;color:rgba(255,255,255,.65);font-weight:500;transition:color .15s}
.foot a:hover{color:#fff}

@media(max-width:440px){.card{padding:28px 22px;border-radius:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-logo">
      <div class="card-logo-name">Dr Mai <span>Abd El Salam</span></div>
    </div>

    <div id="form-state">
      <h1>New password</h1>
      <p class="card-sub">Choose a strong password for your account.</p>

      <div class="alert-box" id="alert"></div>

      <form id="pw-form">
        <div class="field">
          <label class="field-label" for="pw1">New password</label>
          <div class="pw-wrap">
            <input type="password" id="pw1" placeholder="Min. 8 characters" required oninput="checkStrength()">
            <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)">Show</button>
          </div>
          <div class="strength-wrap">
            <div class="strength-track"><div class="strength-bar" id="str-bar"></div></div>
            <div class="strength-lbl" id="str-label"></div>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="pw2">Confirm password</label>
          <div class="pw-wrap">
            <input type="password" id="pw2" placeholder="Repeat password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)">Show</button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Update Password</button>
      </form>
    </div>

    <div id="invalid-state" class="invalid-state" style="display:none">
      <p>This password reset link is invalid or has expired. Request a new one to continue.</p>
      <a href="/forgot-password.html" class="invalid-btn">Request new link</a>
    </div>
  </div>

  <div class="foot">
    <a href="/login.html">← Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
(async () => {
  const hash = new URLSearchParams(location.hash.slice(1));
  const type = hash.get('type');
  if (type !== 'recovery') {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('invalid-state').style.display = 'block';
  }
})();

document.getElementById('pw-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const pw1  = document.getElementById('pw1').value;
  const pw2  = document.getElementById('pw2').value;
  const btn  = document.getElementById('submit-btn');

  hideAlert();

  if (pw1.length < 8) { show('Password must be at least 8 characters.', 'error'); return; }
  if (pw1 !== pw2)    { show('Passwords do not match.', 'error'); return; }

  btn.textContent = 'Updating…';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    show(error.message, 'error');
    btn.textContent = 'Update Password';
    btn.disabled = false;
    return;
  }

  show('Password updated! Redirecting to sign in…', 'success');
  setTimeout(() => location.replace('/login.html'), 1800);
});

function show(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert-box ${type}`;
  el.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

function checkStrength() {
  const pw  = document.getElementById('pw1').value;
  const bar = document.getElementById('str-bar');
  const lbl = document.getElementById('str-label');
  let score = 0;
  if (pw.length >= 8)           score++;
  if (/[A-Z]/.test(pw))         score++;
  if (/[0-9]/.test(pw))         score++;
  if (/[^A-Za-z0-9]/.test(pw))  score++;
  const levels = [
    { w:'25%', bg:'#ef4444', txt:'Too weak' },
    { w:'50%', bg:'#f59e0b', txt:'Fair' },
    { w:'75%', bg:'#3b82f6', txt:'Good' },
    { w:'100%', bg:'#10b981', txt:'Strong' },
  ];
  const l = levels[Math.max(0, score - 1)] || levels[0];
  bar.style.width  = pw.length ? l.w  : '0';
  bar.style.background = pw.length ? l.bg : '';
  lbl.textContent  = pw.length ? l.txt : '';
}
</script>
</body>
</html>
