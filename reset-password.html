<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>New Password | Dr Mai Abd El Salam</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.wrap{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo a{font-size:1.1rem;font-weight:800;color:#111}
.logo a span{color:#1a56db}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card h1{font-size:1.35rem;font-weight:900;letter-spacing:-.02em;margin-bottom:8px}
.card p{font-size:.82rem;color:#6b7280;margin-bottom:28px;font-weight:500}
.alert-box{display:none;padding:11px 14px;border-radius:8px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.alert-box.error{background:#fef2f2;color:#991b1b}
.alert-box.success{background:#f0fdf4;color:#166534}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;font-weight:600;margin-bottom:6px}
.pw-wrap{position:relative}
.field input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.88rem;font-family:inherit;color:#111;outline:none;transition:border-color .2s,box-shadow .2s}
.pw-wrap input{padding-right:56px}
.field input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:.72rem;font-weight:700;color:#1a56db;cursor:pointer}
.strength{height:4px;border-radius:2px;margin-top:6px;transition:background .3s,width .3s;background:#e5e7eb}
.strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:.67rem;color:#6b7280;margin-top:4px;font-weight:600}
.btn-submit{width:100%;padding:12px;background:#111827;color:#fff;border:none;border-radius:9px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-submit:hover{background:#1f2937}
.btn-submit:disabled{background:#9ca3af;cursor:not-allowed}
.invalid-state{text-align:center;padding:20px 0}
.invalid-state p{font-size:.85rem;color:#6b7280;margin-bottom:16px}
.foot{text-align:center;margin-top:24px}
.foot a{font-size:.78rem;font-weight:600;color:#6b7280}
.foot a:hover{color:#111}
@media(max-width:440px){.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <a href="/">Dr Mai <span>Abd El Salam</span></a>
  </div>

  <div class="card">
    <div id="form-state">
      <h1>Set new password</h1>
      <p>Choose a strong password for your account.</p>

      <div class="alert-box" id="alert"></div>

      <form id="pw-form">
        <div class="field">
          <label for="pw1">New password</label>
          <div class="pw-wrap">
            <input type="password" id="pw1" placeholder="Min. 8 characters" required oninput="checkStrength()">
            <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)">Show</button>
          </div>
          <div class="strength"><div class="strength-bar" id="str-bar"></div></div>
          <div class="strength-label" id="str-label"></div>
        </div>
        <div class="field">
          <label for="pw2">Confirm password</label>
          <div class="pw-wrap">
            <input type="password" id="pw2" placeholder="Repeat password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)">Show</button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Update Password</button>
      </form>
    </div>

    <div id="invalid-state" class="invalid-state" style="display:none">
      <p>This password reset link is invalid or has expired.</p>
      <a href="/forgot-password.html" style="display:inline-block;padding:10px 20px;background:#111827;color:#fff;border-radius:8px;font-size:.82rem;font-weight:700;">Request a new link</a>
    </div>
  </div>

  <div class="foot">
    <a href="/login.html">← Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
// Supabase puts the token in the URL hash on redirect
(async () => {
  const hash = new URLSearchParams(location.hash.slice(1));
  const type = hash.get('type');
  if (type !== 'recovery') {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('invalid-state').style.display = 'block';
  }
})();

document.getElementById('pw-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const pw1  = document.getElementById('pw1').value;
  const pw2  = document.getElementById('pw2').value;
  const btn  = document.getElementById('submit-btn');
  const alrt = document.getElementById('alert');

  alrt.style.display = 'none';

  if (pw1.length < 8) { show('Password must be at least 8 characters.', 'error'); return; }
  if (pw1 !== pw2)    { show('Passwords do not match.', 'error'); return; }

  btn.textContent = 'Updating…';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) { show(error.message, 'error'); btn.textContent = 'Update Password'; btn.disabled = false; return; }

  show('Password updated! Redirecting…', 'success');
  setTimeout(() => location.replace('/login.html'), 1800);
});

function show(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert-box ${type}`;
  el.style.display = 'block';
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

function checkStrength() {
  const pw  = document.getElementById('pw1').value;
  const bar = document.getElementById('str-bar');
  const lbl = document.getElementById('str-label');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w: '25%', bg: '#ef4444', txt: 'Too weak' },
    { w: '50%', bg: '#f59e0b', txt: 'Fair' },
    { w: '75%', bg: '#3b82f6', txt: 'Good' },
    { w: '100%', bg: '#10b981', txt: 'Strong' },
  ];
  const l = levels[Math.max(0, score - 1)] || levels[0];
  bar.style.width = pw.length ? l.w : '0';
  bar.style.background = l.bg;
  lbl.textContent = pw.length ? l.txt : '';
}
</script>
</body>
</html>
